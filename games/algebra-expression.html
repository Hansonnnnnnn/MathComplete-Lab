<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bilingual Algebra Multiple Choice Practice</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/progress.js"></script>
  <style>

    :root {
      --bg: #f7f7fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e5e7eb;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --violet: #7c3aed;
      --good: #16a34a;
      --bad: #dc2626;
      --warning: #f59e0b;
      --shadow: 0 18px 42px rgba(15, 23, 42, 0.10);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.35), transparent 34%),
        radial-gradient(circle at top right, rgba(167, 139, 250, 0.28), transparent 32%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 52%, #ffffff 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.42;
      background-image:
        linear-gradient(rgba(15, 23, 42, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, 0.045) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(180deg, black, transparent 72%);
    }

    .mc-site-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 18px auto 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.74);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.84);
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.10);
      position: sticky;
      top: 12px;
      z-index: 20;
    }

    .mc-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #0f172a;
      font-weight: 950;
      text-decoration: none;
      letter-spacing: -0.035em;
      white-space: nowrap;
    }

    .mc-brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: white;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.28);
    }

    .mc-links {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .mc-link {
      color: #475569;
      text-decoration: none;
      font-weight: 850;
      padding: 8px 11px;
      border-radius: 999px;
      transition: background 0.2s, color 0.2s;
    }

    .mc-link:hover {
      color: #1d4ed8;
      background: #eff6ff;
    }

    .mc-link.primary {
      color: white;
      background: #0f172a;
    }

    .mc-link.primary:hover {
      color: white;
      background: #1e293b;
    }

    .container {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 72px;
      position: relative;
    }

    header {
      margin-bottom: 26px;
      overflow: visible;
    }

    .header-main {
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      color: #1d4ed8;
      background: rgba(239, 246, 255, 0.86);
      border: 1px solid rgba(191, 219, 254, 0.8);
      font-weight: 950;
      margin-bottom: 14px;
    }

    .eyebrow-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #10b981;
      box-shadow: 0 0 0 6px rgba(16, 185, 129, 0.12);
    }

    h1,
    #pageTitle {
      display: block;
      margin: 0;
      max-width: 980px;
      font-size: clamp(34px, 5.2vw, 58px);
      line-height: 1.18;
      letter-spacing: -0.055em;
      background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 48%, #7c3aed 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      padding-bottom: 0.18em;
      overflow: visible;
      text-wrap: balance;
    }

    h2 {
      margin: 0 0 12px;
      font-size: clamp(24px, 4vw, 34px);
      letter-spacing: -0.045em;
      line-height: 1.12;
    }

    h3 {
      margin: 0 0 8px;
      letter-spacing: -0.025em;
      line-height: 1.2;
    }

    .subtitle {
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.75;
      max-width: 780px;
      font-size: 17px;
    }

    .card {
      background: rgba(255, 255, 255, 0.90);
      border: 1px solid rgba(255, 255, 255, 0.76);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      backdrop-filter: blur(16px);
    }

    .setup-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin: 22px 0;
    }

    label {
      display: block;
      font-weight: 900;
      margin-bottom: 8px;
    }

    select,
    input {
      width: 100%;
      min-height: 46px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 16px;
      background: white;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    select:focus,
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: white;
      cursor: pointer;
      margin-bottom: 6px;
    }

    .checkbox-label input {
      width: auto;
      min-height: 0;
      transform: scale(1.15);
      accent-color: var(--accent);
    }

    .mini-hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    button {
      appearance: none;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--violet));
      color: white;
      font-weight: 950;
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.14s, filter 0.2s, box-shadow 0.2s;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24);
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(0.98);
    }

    button.secondary {
      background: #111827;
      box-shadow: 0 8px 18px rgba(17, 24, 39, 0.16);
    }

    button.ghost {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .hidden {
      display: none !important;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .explain-box {
      margin-top: 18px;
      padding: 16px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      color: var(--muted);
      line-height: 1.7;
    }

    code {
      background: #eef2ff;
      padding: 2px 6px;
      border-radius: 8px;
      color: #3730a3;
      font-weight: 900;
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: white;
      color: var(--muted);
      font-weight: 850;
      font-size: 14px;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    .timer-pill {
      color: #1d4ed8;
      background: #eff6ff;
      border-color: #bfdbfe;
    }

    .timer-danger {
      color: #991b1b;
      background: #fef2f2;
      border-color: #fecaca;
    }

    .progress-wrap {
      width: 100%;
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin: 10px 0 22px;
    }

    .progress {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      transition: width 0.25s ease;
    }

    .question-title {
      color: var(--muted);
      font-weight: 950;
      margin-bottom: 8px;
    }

    .question-main,
    .expression,
    .equation {
      font-size: clamp(28px, 5vw, 50px);
      line-height: 1.22;
      font-weight: 950;
      letter-spacing: -0.045em;
      margin: 10px 0 20px;
      overflow-wrap: anywhere;
    }

    .question-extra {
      color: var(--muted);
      font-weight: 850;
      margin: -8px 0 18px;
      line-height: 1.6;
    }

    .values {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    .value-chip {
      background: #eef2ff;
      color: #3730a3;
      border: 1px solid #c7d2fe;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 900;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .option {
      border: 2px solid var(--border);
      background: white;
      color: var(--text);
      box-shadow: none;
      border-radius: 18px;
      min-height: 64px;
      font-size: 20px;
      text-align: center;
      padding: 12px;
    }

    .option:hover {
      border-color: var(--accent);
      background: #f8fbff;
    }

    .option.correct {
      border-color: rgba(22, 163, 74, 0.5);
      background: #ecfdf5;
      color: #065f46;
    }

    .option.wrong {
      border-color: rgba(220, 38, 38, 0.5);
      background: #fef2f2;
      color: #991b1b;
    }

    .feedback {
      min-height: 30px;
      font-weight: 950;
      margin: 8px 0 16px;
    }

    .feedback.good {
      color: var(--good);
    }

    .feedback.bad {
      color: var(--bad);
    }

    .solution-box {
      margin: 14px 0 18px;
      padding: 18px;
      border-radius: 20px;
      border: 1px solid #dbeafe;
      background: linear-gradient(180deg, #f8fbff, #ffffff);
      color: #1f2937;
      line-height: 1.7;
    }

    .solution-box h4 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .solution-given {
      margin-bottom: 12px;
      color: #4b5563;
      font-weight: 850;
    }

    .solution-chain {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px 16px;
      overflow-x: auto;
    }

    .chain-line {
      display: grid;
      grid-template-columns: minmax(250px, 1fr) minmax(170px, 0.65fr);
      align-items: baseline;
      gap: 18px;
      margin: 8px 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 17px;
      font-weight: 850;
      white-space: nowrap;
    }

    .chain-line.first {
      grid-template-columns: minmax(0, 1fr);
      padding-left: 0;
    }

    .chain-eq {
      color: #2563eb;
      font-weight: 950;
      text-align: right;
    }

    .chain-note {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      color: #64748b;
      font-size: 13px;
      font-weight: 850;
      white-space: normal;
    }

    .solution-answer {
      margin-top: 12px;
      font-weight: 950;
      color: #111827;
    }



    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin: 18px 0 24px;
    }

    .stat {
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
    }

    .stat .num {
      font-size: 34px;
      font-weight: 950;
      letter-spacing: -0.05em;
    }

    .stat .label {
      color: var(--muted);
      margin-top: 4px;
      font-weight: 850;
    }

    .wrong-list {
      display: grid;
      gap: 14px;
    }

    .wrong-item {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #fff;
      padding: 16px;
    }

    .wrong-item .expr {
      font-size: 22px;
      font-weight: 950;
      margin-bottom: 8px;
      overflow-wrap: anywhere;
    }

    .wrong-item p {
      margin: 6px 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .tag-good {
      color: var(--good);
      font-weight: 950;
    }

    .tag-bad {
      color: var(--bad);
      font-weight: 950;
    }


    .chain-math,
    .answer-math,
    .feedback-math,
    .sample-math,
    .wrong-math {
      display: inline-block;
    }

    .question-main.math-render,
    .expression.math-render,
    .equation.math-render,
    .question-extra.math-render {
      display: block;
      width: 100%;
    }

    .question-extra.math-render {
      margin-top: -6px;
      margin-bottom: 18px;
    }

    .question-main .katex,
    .expression .katex,
    .equation .katex {
      font-size: 1.14em;
      line-height: 1.2;
    }

    .question-extra .katex {
      font-size: 1.05em;
      line-height: 1.25;
    }

    .option .katex {
      font-size: 1.14em;
      line-height: 1.25;
    }

    .chain-line {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    .chain-math .katex {
      font-size: 1.08em;
      line-height: 1.35;
    }

    .feedback-math .katex,
    .answer-math .katex,
    .sample-math .katex,
    .wrong-math .katex {
      font-size: 1.08em;
      line-height: 1.25;
    }

    .math-render .katex {
      color: #0f172a;
    }

    .option.correct .katex {
      color: #065f46;
    }

    .option.wrong .katex {
      color: #991b1b;
    }

    .feedback.bad .katex {
      color: #dc2626;
    }

    .solution-answer > .answer-math {
      display: inline-block;
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #bbf7d0;
      border-radius: 999px;
      padding: 3px 10px;
      margin-left: 4px;
      vertical-align: middle;
    }

    @media (max-width: 760px) {
      .mc-site-shell {
        border-radius: 22px;
        align-items: flex-start;
        flex-direction: column;
      }

      .mc-links {
        justify-content: flex-start;
      }

      .setup-grid,
      .options,
      .result-grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 18px;
      }

      .container {
        width: min(100% - 22px, 1040px);
        padding-top: 28px;
      }

      h1,
      #pageTitle {
        font-size: clamp(33px, 11vw, 48px);
        line-height: 1.18;
        letter-spacing: -0.05em;
      }

      .question-main,
      .expression,
      .equation {
        font-size: clamp(27px, 9vw, 42px);
      }

      .chain-line {
        grid-template-columns: 1fr;
        gap: 2px;
        white-space: normal;
      }

      .chain-note {
        padding-left: 12px;
      }
    }

  

  /* MathComplete Lab shared tool question layout override */
  .question-main,
  .expression,
  .equation {
    max-width: 100%;
    font-size: clamp(28px, 5.4vw, 54px) !important;
    line-height: 1.2 !important;
    font-weight: 500 !important;
    letter-spacing: -0.045em !important;
    margin: 10px 0 24px !important;
    text-align: left !important;
    overflow-wrap: anywhere !important;
    word-break: normal !important;
    text-wrap: pretty;
    white-space: normal;
    justify-content: flex-start !important;
    align-items: flex-start !important;
  }

  .question-main.math-render,
  .expression.math-render,
  .equation.math-render {
    display: block !important;
    width: 100% !important;
    text-align: left !important;
  }

  .question-main .katex,
  .expression .katex,
  .equation .katex {
    white-space: normal !important;
    text-align: left !important;
    font-weight: 400 !important;
  }

  .question-main .katex *,
  .expression .katex *,
  .equation .katex * {
    font-weight: 400 !important;
  }

  .question-line,
  .question-text {
    max-width: 100%;
    text-align: left !important;
    overflow-wrap: anywhere;
    word-break: normal;
    text-wrap: pretty;
  }
</style>
</head>
<body>

  <nav class="mc-site-shell">
    <a class="mc-brand" href="../index.html">
      <span class="mc-brand-mark">∑</span>
      <span>MathComplete Lab</span>
    </a>
    <div class="mc-links">
      <a class="mc-link" href="../practice.html" data-i18n="navPractice">Practice Library</a>
      <a class="mc-link primary" href="../index.html" data-i18n="navHome">Home</a>
    </div>
  </nav>
  <script>
    (function () {
      const lang = localStorage.getItem("mathcomplete_lang") === "zh" ? "zh" : "en";
      document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
      const navText = {
        en: { navPractice: "Practice Library", navHome: "Home" },
        zh: { navPractice: "练习库", navHome: "主页" }
      };
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (navText[lang][key]) el.textContent = navText[lang][key];
      });
    })();
  </script>

  <main class="container">
    <header>
      <div class="header-main">
        <h1 id="pageTitle"></h1>
        <p id="pageSubtitle" class="subtitle"></p>
      </div>
    </header>

    <section id="setupCard" class="card">
      <h2 id="setupTitle"></h2>
      <div class="setup-grid">
        <div class="mcl-tool-mode-field">
          <label id="toolModeLabel" for="toolMode">Practice mode</label>
          <select id="toolMode">
            <option value="practice">Practice Mode</option>
            <option value="learn" selected>Learn Mode</option>
            <option value="exam">Exam Mode</option>
          </select>
          <p class="mcl-tool-mode-hint" id="mclToolModeHint">Every answer shows the solution, then you move on manually.</p>
        </div>
        <div>
          <label id="difficultyLabel" for="difficulty"></label>
          <select id="difficulty"></select>
        </div>
        <div>
          <label id="questionCountLabel" for="questionCount"></label>
          <input id="questionCount" type="number" min="1" max="100" value="10" />
        </div>
        <div>
          <label id="optionCountLabel" for="optionCount"></label>
          <select id="optionCount"></select>
        </div>
        <div>
          <label class="checkbox-label" for="timedMode">
            <input id="timedMode" type="checkbox" />
            <span id="timedModeText"></span>
          </label>
          <p id="timedModeHint" class="mini-hint"></p>
        </div>
        <div>
          <label id="timerLevelLabel" for="timerLevel"></label>
          <select id="timerLevel"></select>
        </div>
      </div>

      <div class="actions">
        <button id="startBtn"></button>
        <button id="sampleBtn" class="ghost"></button>
      </div>

      <div id="sampleBox" class="explain-box hidden"></div>
      <div id="distractorNote" class="explain-box"></div>
    </section>

    <section id="quizCard" class="card hidden">
      <div class="topbar">
        <div>
          <span class="pill" id="progressText"></span>
          <span class="pill" id="difficultyText"></span>
          <span class="pill timer-pill hidden" id="timerDisplay"></span>
        </div>
        <button id="quitBtn" class="ghost"></button>
      </div>

      <div class="progress-wrap">
        <div id="progressBar" class="progress"></div>
      </div>

      <div id="questionTitle" class="question-title"></div>
      <div id="expression" class="expression"></div>
      <div id="values" class="values"></div>

      <div id="options" class="options"></div>
      <div id="feedback" class="feedback"></div>
      <div id="solutionBox" class="solution-box hidden"></div>

      <div class="actions">
        <button id="nextBtn" disabled></button>
      </div>
    </section>

    <section id="resultCard" class="card hidden">
      <h2 id="resultTitle"></h2>
      <div class="result-grid">
        <div class="stat">
          <div id="scoreNum" class="num">0/0</div>
          <div id="scoreLabel" class="label"></div>
        </div>
        <div class="stat">
          <div id="accuracyNum" class="num">0%</div>
          <div id="accuracyLabel" class="label"></div>
        </div>
        <div class="stat">

    function buildDifficultyPlan(count, selectedDifficulty) {
      if (selectedDifficulty !== "mixed") {
        return Array(count).fill(selectedDifficulty);
      }

      const plan = [];
      while (plan.length < count) {
        plan.push(...shuffle(REAL_DIFFICULTIES));
      }

      return plan.slice(0, count);
    }

    function pickDifficultyForSample(selectedDifficulty) {
      return selectedDifficulty === "mixed" ? choose(REAL_DIFFICULTIES) : selectedDifficulty;
    }

document.getElementById("setupTitle").textContent = t.setupTitle;

    function rebuildDifficultyOptions() {
      const current = difficultyEl.value || "medium";
      difficultyEl.innerHTML = "";
      ["easy", "medium", "hard", "expert", "hell", "mixed"].forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = tr().difficultyOptions[value];
        difficultyEl.appendChild(option);
      });
      difficultyEl.value = current;
    }

    function rebuildOptionCountOptions() {
      const current = optionCountEl.value || "4";
      optionCountEl.innerHTML = "";
      [4, 5, 6].forEach(value => {
        const option = document.createElement("option");
        option.value = String(value);
        option.textContent = tr().optionCount(value);
        optionCountEl.appendChild(option);
      });
      optionCountEl.value = current;
    }

    function rebuildTimerLevelOptions() {
      const current = timerLevelEl.value || "timer_medium";
      timerLevelEl.innerHTML = "";
      ["timer_easy", "timer_medium", "timer_hard", "timer_extreme", "timer_hell"].forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = tr().timerOptions[value];
        timerLevelEl.appendChild(option);
      });
      timerLevelEl.value = TIMER_DURATIONS[current] ? current : "timer_medium";
    }

    function updateTimerControls() {
      timerLevelEl.disabled = !timedModeEl.checked;
    }

    function formatTime(totalSeconds) {
      const safeSeconds = Math.max(0, totalSeconds);
      const minutes = Math.floor(safeSeconds / 60);
      const seconds = safeSeconds % 60;
      return `${minutes}:${String(seconds).padStart(2, "0")}`;
    }

    function clearTimer() {
      if (timerId !== null) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function updateTimerDisplay() {
      if (!timedModeEl.checked || quizCard.classList.contains("hidden")) {
        timerDisplay.classList.add("hidden");
        return;
      }

      timerDisplay.classList.remove("hidden");
      timerDisplay.textContent = tr().timerDisplay(timeLeft);
      timerDisplay.classList.toggle("timer-danger", timeLeft <= 10);
    }

    function startTimerForQuestion() {
      clearTimer();

      if (!timedModeEl.checked) {
        timerDisplay.classList.add("hidden");
        return;
      }

      timeLeft = TIMER_DURATIONS[timerLevelEl.value] || 60;
      updateTimerDisplay();

      timerId = setInterval(() => {
        timeLeft -= 1;
        updateTimerDisplay();

        if (timeLeft <= 0) {
          handleTimeUp();
        }
      }, 1000);
    }

    function handleTimeUp() {
      if (answered) return;

      clearTimer();
      answered = true;

      const q = quiz[currentIndex];
      const buttons = [...optionsEl.querySelectorAll(".option")];

      buttons.forEach(btn => {
        btn.disabled = true;
        if (Number(btn.dataset.rawValue) === q.answer) btn.classList.add("correct");
      });

      lastFeedback = { correct: false, answer: q.answer, timeUp: true };
      renderFeedback(false, q.answer, true);

      wrongAnswers.push({
        expression: q.displayExpression,
        rawExpression: q.expression,
        values: q.values,
        answer: q.answer,
        selected: null,
        timeUp: true,
        type: q.type,
        difficulty: q.difficulty
      });

      void window.MCLProgress?.recordGameAttempt?.({
        question: q,
        correctAnswer: q.answer,
        selectedAnswer: "",
        isCorrect: false,
        timeUp: true
      });

      renderSolutionBox();
      nextBtn.disabled = false;
      progressBar.style.width = `${((currentIndex + 1) / quiz.length) * 100}%`;
    }

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function choose(arr) {
      return arr[randInt(0, arr.length - 1)];
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = randInt(0, i);
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function nonZeroRand(min, max) {
      let n = 0;
      while (n === 0) {
        n = randInt(min, max);
      }
      return n;
    }

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function prettyVarValues(values) {
      return Object.entries(values)
        .map(([k, v]) => `${k} = ${v}`)
        .join(lang === "zh" ? "，" : ", ");
    }

    function evaluateExpression(raw, values) {
      let js = raw;
      for (const [key, value] of Object.entries(values)) {
        js = js.replaceAll(key, `(${value})`);
      }
      js = js.replaceAll("^", "**");
      return Function(`"use strict"; return (${js});`)();
    }

    function generateValues(difficulty) {
      const ranges = {
        easy: [-6, 8],
        medium: [-8, 10],
        hard: [-10, 12],
        expert: [-12, 14],
        hell: [-14, 16]
      };

      const [min, max] = ranges[difficulty] || ranges.medium;
      return {
        x: nonZeroRand(min, max),
        y: nonZeroRand(min, max),
        z: nonZeroRand(min, max),
        a: nonZeroRand(Math.max(-8, min), Math.min(9, max)),
        b: nonZeroRand(Math.max(-8, min), Math.min(9, max)),
        c: nonZeroRand(Math.max(-7, min), Math.min(8, max))
      };
    }

    function getTemplates(difficulty) {
      if (difficulty === "easy") return getEasyTemplates();
      if (difficulty === "medium") return getMediumTemplates();
      if (difficulty === "hard") return getHardTemplates();
      if (difficulty === "expert") return getExpertTemplates();
      if (difficulty === "hell") return getHellTemplates();
      return getMediumTemplates();
    }

        function generateQuestion(difficulty, forcedType = null) {
      for (let attempt = 0; attempt < 100; attempt++) {
        const allValues = generateValues(difficulty);
        let templates = getTemplates(difficulty);

        if (forcedType) {
          const matched = templates.filter(t => t.type === forcedType);
          if (matched.length > 0) templates = matched;
        }

        const template = choose(templates);
        const values = {};
        template.used.forEach(k => values[k] = allValues[k]);

        const answer = evaluateExpression(template.expr, values);
        if (Number.isInteger(answer) && Math.abs(answer) <= 999) {
          const question = {
            expression: template.expr,
            displayExpression: toDisplayExpression(template.expr),
            values,
            answer,
            type: template.type,
            difficulty,
            options: []
          };
          question.options = generateOptions(question, Number(optionCountEl.value || 4));
          return question;
        }
      }

      const fallback = {
        expression: "2*x + 3",
        displayExpression: "2x + 3",
        values: { x: 4 },
        answer: 11,
        type: "fallback",
        difficulty,
        options: []
      };
      fallback.options = generateOptions(fallback, Number(optionCountEl.value || 4));
      return fallback;
    }

    function toDisplayExpression(expr) {
      return expr
        .replace(/\*/g, "")
        .replace(/\^2/g, "²")
        .replace(/\^3/g, "³");
    }

    function wrongEvaluationCandidates(q) {
      const expr = q.expression;
      const values = q.values;
      const candidates = new Set();

      function safeEval(modifiedExpr) {
        try {
          const value = evaluateExpression(modifiedExpr, values);
          if (Number.isInteger(value) && value !== q.answer && Math.abs(value) <= 1500) {
            candidates.add(value);
          }
        } catch (e) {}
      }

      safeEval(expr.replaceAll("-", "+"));
      safeEval(expr.replaceAll("+", "-"));
      safeEval(expr.replaceAll("^2", "*2"));
      safeEval(expr.replaceAll("(", "").replaceAll(")", ""));

      if (expr.includes("x") && expr.includes("y")) {
        safeEval(expr.replaceAll("x", "TEMP").replaceAll("y", "x").replaceAll("TEMP", "y"));
      }

      candidates.add(q.answer + randInt(1, 9));
      candidates.add(q.answer - randInt(1, 9));
      candidates.add(-q.answer);
      candidates.add(q.answer + 10);
      candidates.add(q.answer - 10);

      const valueList = Object.values(values);
      if (valueList.length >= 2) {
        candidates.add(q.answer + valueList[0]);
        candidates.add(q.answer - valueList[1]);
      }

      return [...candidates]
        .filter(n => Number.isFinite(n) && Number.isInteger(n) && n !== q.answer)
        .filter(n => Math.abs(n) <= 1500);
    }

    function generateOptions(q, count) {
      const set = new Set([q.answer]);
      const candidates = shuffle(wrongEvaluationCandidates(q));

      for (const item of candidates) {
        if (set.size >= count) break;
        set.add(item);
      }

      while (set.size < count) {
        const offset = choose([-15, -12, -9, -7, -5, -4, -3, -2, 2, 3, 4, 5, 7, 9, 12, 15]);
        const n = q.answer + offset + randInt(-3, 3);
        if (n !== q.answer) set.add(n);
      }

      return shuffle([...set]);
    }

    function buildQuiz() {
      const selectedDifficulty = difficultyEl.value;
      const count = clamp(Number(questionCountEl.value || 10), 1, 100);
      lastDifficulty = selectedDifficulty;
      lastQuestionCount = count;
      quiz = [];

      const difficultyPlan = buildDifficultyPlan(count, selectedDifficulty);

      for (let i = 0; i < count; i++) {
        quiz.push(generateQuestion(difficultyPlan[i]));
      }

      currentIndex = 0;
      correctCount = 0;
      wrongAnswers = [];
      answered = false;
      lastFeedback = null;
      showQuiz();
      renderQuestion(true);
    }

    function buildWrongTypeQuiz() {
      if (wrongAnswers.length === 0) {
        alert(tr().noWrongAlert);
        return;
      }

      const count = Math.max(wrongAnswers.length * 2, 5);
      quiz = [];

      for (let i = 0; i < count; i++) {
        const source = choose(wrongAnswers);
        const difficulty = lastDifficulty === "mixed" ? source.difficulty : lastDifficulty;
        quiz.push(generateQuestion(difficulty, source.type));
      }

      currentIndex = 0;
      correctCount = 0;
      wrongAnswers = [];
      answered = false;
      lastFeedback = null;
      showQuiz();
      renderQuestion(true);
    }

    function showQuiz() {
      setupCard.classList.add("hidden");
      resultCard.classList.add("hidden");
      quizCard.classList.remove("hidden");
    }

    function renderQuestion(resetOptions) {
      const q = quiz[currentIndex];
      if (!q) return;

      if (resetOptions) {
        answered = false;
        lastFeedback = null;
        feedbackEl.textContent = "";
        feedbackEl.className = "feedback";
        solutionBox.classList.add("hidden");
        solutionBox.innerHTML = "";
        nextBtn.disabled = true;
      }

      progressText.textContent = tr().progress(currentIndex + 1, quiz.length);
      difficultyText.textContent = lastDifficulty === "mixed" ? `${tr().difficulties.mixed} · ${tr().difficulties[q.difficulty]}` : tr().difficulties[q.difficulty];
      progressBar.style.width = `${(currentIndex / quiz.length) * 100}%`;
      renderMaybeMath(expressionEl, q.displayExpression, true);

      valuesEl.innerHTML = "";
      Object.entries(q.values).forEach(([key, value]) => {
        const chip = document.createElement("div");
        chip.className = "value-chip";
        renderMaybeMath(chip, `${key} = ${value}`);
        valuesEl.appendChild(chip);
      });

      if (resetOptions) {
        optionsEl.innerHTML = "";
        q.options.forEach(option => {
          const btn = document.createElement("button");
          btn.className = "option";
          btn.dataset.rawValue = String(option);
          btn.setAttribute("aria-label", String(option));
          renderMaybeMath(btn, String(option));
          btn.addEventListener("click", () => chooseOption(btn, option));
          optionsEl.appendChild(btn);
        });
      }

      nextBtn.textContent = currentIndex === quiz.length - 1 ? tr().resultBtn : tr().nextBtn;

      if (resetOptions) {
        startTimerForQuestion();
      } else {
        updateTimerDisplay();
      }
    }


    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function splitTopLevel(input, delimiter){
      const parts = [];
      let depth = 0;
      let start = 0;
      for(let i = 0; i < input.length; i++){
        const ch = input[i];
        if(ch === "(") depth++;
        else if(ch === ")") depth = Math.max(0, depth - 1);
        else if(ch === delimiter && depth === 0){
          parts.push(input.slice(start, i).trim());
          start = i + 1;
        }
      }
      parts.push(input.slice(start).trim());
      return parts.filter(Boolean);
    }

    function findTopLevel(input, target){
      let depth = 0;
      for(let i = 0; i < input.length; i++){
        const ch = input[i];
        if(ch === "(") depth++;
        else if(ch === ")") depth = Math.max(0, depth - 1);
        else if(ch === target && depth === 0) return i;
      }
      return -1;
    }

    function stripOuterParens(input){
      const s = String(input).trim();
      if(!s.startsWith("(") || !s.endsWith(")")) return s;
      let depth = 0;
      for(let i = 0; i < s.length; i++){
        if(s[i] === "(") depth++;
        if(s[i] === ")") depth--;
        if(depth === 0 && i < s.length - 1) return s;
      }
      return s.slice(1, -1).trim();
    }

    function escapeLatexText(text){
      return String(text)
        .replace(/\\/g, "\\textbackslash{}")
        .replace(/([#$%&_{}])/g, "\\$1");
    }

    function mathToLatex(expr){
      let s = String(expr ?? "").trim();
      if(!s) return "";

      s = s
        .replace(/−/g, "-")
        .replace(/×/g, "\\times ")
        .replace(/·/g, "\\cdot ")
        .replace(/\u00a0/g, " ");

      const pureText = {
        "No solution": "\\text{No solution}",
        "Infinitely many solutions": "\\text{Infinitely many solutions}",
        "No answer: time is up": "\\text{No answer: time is up}",
        "无解": "\\text{无解}",
        "无穷多个解": "\\text{无穷多个解}",
        "未作答（时间到）": "\\text{未作答（时间到）}"
      };
      if(pureText[s]) return pureText[s];

      const colonMatch = s.match(/^([A-Za-z\u4e00-\u9fff ]+):\s*(.+)$/);
      if(colonMatch){
        return `\\text{${escapeLatexText(colonMatch[1] + ": ")}}${mathToLatex(colonMatch[2])}`;
      }

      const commaParts = splitTopLevel(s, ",");
      if(commaParts.length > 1){
        return commaParts.map(part => mathToLatex(part)).join(",\\quad ");
      }

      const equalParts = splitTopLevel(s, "=");
      if(equalParts.length > 1){
        return equalParts.map(part => mathToLatex(part)).join(" = ");
      }

      const slashIndex = findTopLevel(s, "/");
      if(slashIndex > -1){
        const numerator = stripOuterParens(s.slice(0, slashIndex));
        const denominator = stripOuterParens(s.slice(slashIndex + 1));
        return `\\frac{${mathToLatex(numerator)}}{${mathToLatex(denominator)}}`;
      }

      s = s.replace(/\*/g, "\\cdot ");
      s = s.replace(/\bof\b/g, "\\text{ of }");
      s = s.replace(/%/g, "\\%");
      s = s.replace(/π/g, "\\text{π}");
      s = s.replace(/\?/g, "?");

      s = s.replace(/sqrt\(([^()]*)\)/g, (_, inner) => `\\sqrt{${mathToLatex(inner)}}`);
      s = s.replace(/sec\^2\(([^()]*)\)/g, (_, inner) => `\\sec^{2}\\left(${mathToLatex(inner)}\\right)`);
      s = s.replace(/(sin|cos|tan|sec|ln)\(([^()]*)\)/g, (_, fn, inner) => `\\${fn}\\left(${mathToLatex(inner)}\\right)`);
      s = s.replace(/f\(g\(([^()]*)\)\)/g, (_, inner) => `f\\left(g\\left(${mathToLatex(inner)}\\right)\\right)`);
      s = s.replace(/g\(f\(([^()]*)\)\)/g, (_, inner) => `g\\left(f\\left(${mathToLatex(inner)}\\right)\\right)`);
      s = s.replace(/f\(([^()]*)\)/g, (_, inner) => `f\\left(${mathToLatex(inner)}\\right)`);
      s = s.replace(/g\(([^()]*)\)/g, (_, inner) => `g\\left(${mathToLatex(inner)}\\right)`);
      s = s.replace(/e\^\(([^()]*)\)/g, (_, inner) => `e^{${mathToLatex(inner)}}`);
      s = s.replace(/e\^x/g, "e^{x}");

      s = s.replace(/\^\(([^)]+)\)/g, (_, exponent) => `^{${mathToLatex(exponent)}}`);
      s = s.replace(/\^(-?\d+)/g, "^{$1}");
      s = s.replace(/\^([a-zA-Z]+)/g, "^{$1}");
      s = s.replace(/([a-zA-Z])²/g, "$1^{2}");
      s = s.replace(/([a-zA-Z])³/g, "$1^{3}");

      s = s.replace(/x\^\{1\}/g, "x");
      s = s.replace(/x\^\{0\}/g, "1");
      s = s.replace(/\bln\b/g, "\\ln");
      s = s.replace(/(^|[^A-Za-z])pi(?![A-Za-z])/g, "$1\\text{π}");

      return s;
    }

    function shouldRenderMath(expr){
      const s = String(expr ?? "").trim();
      if(!s) return false;
      if(["No solution","Infinitely many solutions","无解","无穷多个解"].includes(s)) return true;
      if(/[=^/*+\-()π%²³]/.test(s)) return true;
      if(/^\s*-?\d+(\.\d+)?\s*$/.test(s)) return true;
      if(/^[A-Za-z]\s*\(/.test(s)) return true;
      return false;
    }

    function renderLatex(el, latex, displayMode=false){
      el.classList.add("math-render");
      const boldLatex = `\\boldsymbol{${latex}}`;
      if(window.katex){
        katex.render(boldLatex, el, {
          throwOnError: false,
          displayMode
        });
      } else {
        el.textContent = latex;
      }
    }

    function renderMath(el, expr, displayMode=false){
      renderLatex(el, mathToLatex(expr), displayMode);
    }

    function renderMaybeMath(el, expr, displayMode=false){
      const raw = String(expr ?? "");
      if(shouldRenderMath(raw)){
        renderMath(el, raw, displayMode);
      } else {
        el.classList.remove("math-render");
        el.textContent = raw;
      }
    }

    function mathSpan(expr, className=""){
      const cls = className ? ` class="${className}"` : "";
      return `<span${cls} data-math="${escapeHtml(expr)}"></span>`;
    }

    function renderTaggedMath(root){
      root.querySelectorAll("[data-math]").forEach(el => {
        renderMaybeMath(el, el.getAttribute("data-math") || "");
      });
    }



    function formatValueForSubstitution(value) {
      return value < 0 ? `(${value})` : String(value);
    }

    function substituteForSolution(expr, values) {
      let result = expr;
      for (const [key, value] of Object.entries(values)) {
        result = result.replaceAll(key, formatValueForSubstitution(value));
      }
      return result;
    }

    function safeNumericEval(text) {
      if (!/^[0-9+\-*/^().\s]+$/.test(text)) return null;
      try {
        const value = Function(`"use strict"; return (${text.replaceAll("^", "**")});`)();
        if (Number.isFinite(value) && Number.isInteger(value)) return value;
      } catch (e) {}
      return null;
    }

    function atomNumber(text) {
      const cleaned = String(text).replace(/[()]/g, "").trim();
      if (/^-?\d+$/.test(cleaned)) return Number(cleaned);
      return null;
    }

    function formatAtom(n) {
      return n < 0 ? `(${n})` : String(n);
    }

    function cleanSignsForDisplay(s) {
      return String(s)
        .replace(/\+\s*\(-(\d+)\)/g, "- $1")
        .replace(/-\s*\(-(\d+)\)/g, "+ $1")
        .replace(/\+\s*-/g, "- ")
        .replace(/-\s*-/g, "+ ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function displayOriginalExpression(expr) {
      return expr
        .replace(/(^|[\s+\-(])1\*([a-z])/g, "$1$2")
        .replace(/\*/g, "")
        .replace(/\^2/g, "²")
        .replace(/\^3/g, "³")
        .replace(/\s+/g, " ")
        .trim();
    }

    function displayArithmeticExpression(expr, compactProducts = false) {
      let s = String(expr)
        .replace(/\s+/g, " ")
        .trim();

      if (compactProducts) {
        s = s.replace(/(^|[\s+\-(])1\s*\*\s*\((-?\d+)\)/g, (match, prefix, n) => {
          return `${prefix}${n}`;
        });
        s = s.replace(/(\(-?\d+\)|-?\d+)\s*\*\s*(\(-?\d+\)|-?\d+)/g, (match, a, b) => {
          const right = b.startsWith("(") ? b : `(${b})`;
          return `${a}${right}`;
        });
      } else {
        s = s.replace(/\*/g, "×");
      }

      s = s.replace(/\^2/g, "²").replace(/\^3/g, "³");
      return cleanSignsForDisplay(s);
    }

    function getParenthesesPairs(expr) {
      const stack = [];
      const pairs = [];

      for (let i = 0; i < expr.length; i++) {
        if (expr[i] === "(") {
          stack.push(i);
        } else if (expr[i] === ")" && stack.length > 0) {
          const start = stack.pop();
          pairs.push({ start, end: i, inner: expr.slice(start + 1, i) });
        }
      }

      return pairs;
    }

    function isPureNumberText(text) {
      return /^\s*-?\d+\s*$/.test(String(text));
    }

    function isParenthesesCandidate(pair) {
      if (isPureNumberText(pair.inner)) return false;
      const value = safeNumericEval(pair.inner);
      return value !== null;
    }

    function simplifyParenthesesPass(expr) {
      const pairs = getParenthesesPairs(expr);
      const candidates = pairs
        .filter(isParenthesesCandidate)
        .sort((a, b) => (a.end - a.start) - (b.end - b.start));

      const selected = [];
      for (const pair of candidates) {
        const containsSelected = selected.some(s => pair.start < s.start && s.end < pair.end);
        const overlapsSelected = selected.some(s => !(pair.end < s.start || pair.start > s.end));
        if (!containsSelected && !overlapsSelected) {
          selected.push(pair);
        }
      }

      if (selected.length === 0) {
        return { result: expr, changed: false };
      }

      let result = expr;
      selected.sort((a, b) => b.start - a.start).forEach(pair => {
        const value = safeNumericEval(pair.inner);
        result = result.slice(0, pair.start) + formatAtom(value) + result.slice(pair.end + 1);
      });

      return { result, changed: result !== expr };
    }

    function simplifyPowersPass(expr) {
      let changed = false;

      const result = expr.replace(/(\(-?\d+\)|-?\d+)\s*\^\s*2/g, (match, base) => {
        const n = atomNumber(base);
        if (n === null) return match;
        changed = true;
        return formatAtom(n * n);
      });

      return { result, changed: result !== expr && changed };
    }

    function simplifyMultiplicationsPass(expr) {
      let changed = false;

      const result = expr.replace(/(\(-?\d+\)|-?\d+)\s*\*\s*(\(-?\d+\)|-?\d+)/g, (match, a, b) => {
        const x = atomNumber(a);
        const y = atomNumber(b);
        if (x === null || y === null) return match;
        changed = true;
        return formatAtom(x * y);
      });

      return { result, changed: result !== expr && changed };
    }

    function pushUniqueLine(lines, line) {
      const normalized = String(line).replace(/\s+/g, " ").trim();
      if (!normalized) return;
      if (lines.length === 0 || lines[lines.length - 1] !== normalized) {
        lines.push(normalized);
      }
    }

    function buildCleanSolutionLines(q) {
      const lines = [];
      const originalDisplay = displayOriginalExpression(q.expression);
      const substitutedRaw = substituteForSolution(q.expression, q.values);
      const substitutedDisplay = displayArithmeticExpression(substitutedRaw, true);

      pushUniqueLine(lines, originalDisplay);
      pushUniqueLine(lines, substitutedDisplay);

      let current = substitutedRaw;

      for (let i = 0; i < 8; i++) {
        const p = simplifyParenthesesPass(current);
        if (!p.changed) break;
        current = p.result;
        pushUniqueLine(lines, displayArithmeticExpression(current, true));
      }

      const pow = simplifyPowersPass(current);
      if (pow.changed) {
        current = pow.result;
        pushUniqueLine(lines, displayArithmeticExpression(current, true));
      }

      const mult = simplifyMultiplicationsPass(current);
      if (mult.changed) {
        current = mult.result;
        pushUniqueLine(lines, displayArithmeticExpression(current, false));
      }

      for (let i = 0; i < 6; i++) {
        const p = simplifyParenthesesPass(current);
        if (!p.changed) break;
        current = p.result;
        pushUniqueLine(lines, displayArithmeticExpression(current, false));
      }

      const finalValue = safeNumericEval(current);
      if (finalValue !== null) {
        pushUniqueLine(lines, String(finalValue));
      }

      if (lines[lines.length - 1] !== String(q.answer)) {
        pushUniqueLine(lines, String(q.answer));
      }

      return lines;
    }

    function renderSolutionBox() {
      const q = quiz[currentIndex];
      if (!q || !answered) {
        solutionBox.classList.add("hidden");
        solutionBox.innerHTML = "";
        return;
      }

      const givenText = prettyVarValues(q.values);
      const lines = buildCleanSolutionLines(q);

      solutionBox.classList.remove("hidden");
      solutionBox.innerHTML = `
        <h4>${tr().solutionTitle}</h4>
        <div class="solution-given">${tr().solutionGiven}: ${escapeHtml(givenText)}</div>
        <div class="solution-chain">
          ${lines.map((line, index) => {
            if (index === 0) {
              return `<div class="chain-line first">${mathSpan(line, "chain-math")}</div>`;
            }
            return `<div class="chain-line"><span class="chain-eq">=</span>${mathSpan(line, "chain-math")}</div>`;
          }).join("")}
        </div>
        <div class="solution-answer">${tr().solutionFinal} ${mathSpan(String(q.answer), "answer-math")}</div>
      `;
      renderTaggedMath(solutionBox);
    }

    function renderFeedback(correct, answer, timeUp = false) {
      feedbackEl.className = "feedback";
      if (correct) {
        feedbackEl.textContent = tr().correctFeedback;
        feedbackEl.classList.add("good");
      } else {
        const prefix = timeUp
          ? (lang === "zh" ? "时间到。正确答案是" : "Time is up. The correct answer is")
          : (lang === "zh" ? "错误。正确答案是" : "Incorrect. The correct answer is");
        feedbackEl.innerHTML = `${prefix} ${mathSpan(String(answer), "feedback-math")}.`;
        renderTaggedMath(feedbackEl);
        feedbackEl.classList.add("bad");
      }
    }

    function chooseOption(button, selected) {
      if (answered) return;
      answered = true;
      clearTimer();

      const q = quiz[currentIndex];
      const buttons = [...optionsEl.querySelectorAll(".option")];

      buttons.forEach(btn => {
        btn.disabled = true;
        if (Number(btn.dataset.rawValue) === q.answer) btn.classList.add("correct");
      });

      if (selected === q.answer) {
        correctCount++;
        lastFeedback = { correct: true, answer: q.answer, timeUp: false };
        renderFeedback(true, q.answer, false);
      } else {
        button.classList.add("wrong");
        lastFeedback = { correct: false, answer: q.answer, timeUp: false };
        renderFeedback(false, q.answer, false);

        wrongAnswers.push({
          expression: q.displayExpression,
          rawExpression: q.expression,
          values: q.values,
          answer: q.answer,
          selected,
          type: q.type,
          difficulty: q.difficulty
        });
      }

      void window.MCLProgress?.recordGameAttempt?.({
        question: q,
        correctAnswer: q.answer,
        selectedAnswer: selected,
        isCorrect: selected === q.answer
      });

      renderSolutionBox();
      nextBtn.disabled = false;
      progressBar.style.width = `${((currentIndex + 1) / quiz.length) * 100}%`;
    }

    function nextQuestion() {
      if (!answered) return;
      if (currentIndex < quiz.length - 1) {
        currentIndex++;
        renderQuestion(true);
      } else {
        clearTimer();
        showResult();
      }
    }

    function showResult() {
      clearTimer();
      quizCard.classList.add("hidden");
      resultCard.classList.remove("hidden");
      renderResultBody();
    }

    function renderResultBody() {
      const total = quiz.length;
      const accuracy = total === 0 ? 0 : Math.round((correctCount / total) * 100);

      scoreNum.textContent = `${correctCount}/${total}`;
      accuracyNum.textContent = `${accuracy}%`;
      wrongNum.textContent = `${wrongAnswers.length}`;

      wrongList.innerHTML = "";

      if (wrongAnswers.length === 0) {
        const item = document.createElement("div");
        item.className = "wrong-item";
        item.innerHTML = `
          <div class="expr">${tr().noWrong}</div>
          <p class="tag-good">${tr().noWrongTip}</p>
        `;
        wrongList.appendChild(item);
      } else {
        wrongAnswers.forEach((w, index) => {
          const item = document.createElement("div");
          item.className = "wrong-item";
          item.innerHTML = `
            <div class="expr">${index + 1}. ${w.expression}</div>
            <p>${tr().wrongValues}: ${prettyVarValues(w.values)}</p>
            <p>${tr().yourAnswer}: <span class="tag-bad">${w.timeUp ? tr().timeUpAnswer : w.selected}</span></p>
            <p>${tr().correctAnswer}: <span class="tag-good">${w.answer}</span></p>
            <p>${tr().suggestion}</p>
          `;
          wrongList.appendChild(item);
        });
      }
    }

    function resetToSetup() {
      clearTimer();
      setupCard.classList.remove("hidden");
      quizCard.classList.add("hidden");
      resultCard.classList.add("hidden");
      progressBar.style.width = "0%";
      sampleBox.classList.add("hidden");
      sampleBox.innerHTML = "";
      solutionBox.classList.add("hidden");
      solutionBox.innerHTML = "";
      lastFeedback = null;
    }

    function quitQuiz() {
      if (answered || currentIndex > 0) {
        showResult();
      } else {
        resetToSetup();
      }
    }

    function showSample() {
      const sampleDifficulty = pickDifficultyForSample(difficultyEl.value);
      const q = generateQuestion(sampleDifficulty);
      sampleBox.classList.remove("hidden");
      sampleBox.innerHTML = `
        <strong>${tr().sampleTitle}:</strong><br>
        ${tr().sampleExpression}: ${mathSpan(q.displayExpression, "sample-math")}<br>
        ${tr().sampleValues}: ${prettyVarValues(q.values)}<br>
        ${tr().sampleAnswer}: ${mathSpan(String(q.answer), "sample-math")}<br>
        ${tr().sampleOptions}: ${q.options.map(x => mathSpan(String(x), "sample-math")).join(" ")}
      `;
      renderTaggedMath(sampleBox);
    }

    timedModeEl.addEventListener("change", updateTimerControls);

    startBtn.addEventListener("click", buildQuiz);
    sampleBtn.addEventListener("click", showSample);
    nextBtn.addEventListener("click", nextQuestion);
    quitBtn.addEventListener("click", quitQuiz);
    restartBtn.addEventListener("click", resetToSetup);
    reviewWrongBtn.addEventListener("click", buildWrongTypeQuiz);

    applyLanguage();
  </script>
  <script src="../assets/js/tool-modes.js"></script>
  <script src="../assets/js/report-export.js"></script>
  <script src="../assets/js/home-link.js"></script>
</body>
