<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Determinant Practice</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/auth-ui.js"></script>
  <script src="../assets/js/progress.js"></script>
  <style>

    :root {
      --bg: #f7f7fb;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e5e7eb;
      --accent: #2563eb;
      --violet: #7c3aed;
      --good: #16a34a;
      --bad: #dc2626;
      --shadow: 0 18px 42px rgba(15, 23, 42, 0.10);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.35), transparent 34%),
        radial-gradient(circle at top right, rgba(167, 139, 250, 0.28), transparent 32%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 52%, #ffffff 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.42;
      background-image:
        linear-gradient(rgba(15, 23, 42, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, 0.045) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(180deg, black, transparent 72%);
    }

    .mc-site-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 18px auto 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.74);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.84);
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.10);
      position: sticky;
      top: 12px;
      z-index: 20;
    }

    .mc-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #0f172a;
      font-weight: 950;
      text-decoration: none;
      letter-spacing: -0.035em;
      white-space: nowrap;
    }

    .mc-brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: white;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.28);
    }

    .mc-links {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .mc-link {
      color: #475569;
      text-decoration: none;
      font-weight: 850;
      padding: 8px 11px;
      border-radius: 999px;
      transition: background 0.2s, color 0.2s;
    }

    .mc-link:hover { color: #1d4ed8; background: #eff6ff; }
    .mc-link.primary { color: white; background: #0f172a; }
    .mc-link.primary:hover { color: white; background: #1e293b; }

    .container {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 38px 0 68px;
      position: relative;
    }

    header { margin-bottom: 24px; overflow: visible; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      color: #1d4ed8;
      background: rgba(239, 246, 255, 0.86);
      border: 1px solid rgba(191, 219, 254, 0.8);
      font-weight: 950;
      margin-bottom: 14px;
    }

    .eyebrow-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #10b981;
      box-shadow: 0 0 0 6px rgba(16, 185, 129, 0.12);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5.2vw, 56px);
      line-height: 1.16;
      letter-spacing: -0.055em;
      background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 48%, #7c3aed 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      padding-bottom: 0.18em;
      overflow: visible;
    }

    h2 { margin: 0 0 12px; font-size: clamp(24px, 4vw, 34px); letter-spacing: -0.045em; }
    h3 { margin: 0 0 8px; letter-spacing: -0.025em; }

    .subtitle {
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.75;
      max-width: 780px;
      font-size: 17px;
    }

    .card {
      background: rgba(255, 255, 255, 0.90);
      border: 1px solid rgba(255, 255, 255, 0.76);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      backdrop-filter: blur(16px);
    }

    .setup-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin: 22px 0;
    }

    label { display: block; font-weight: 900; margin-bottom: 8px; }

    select,
    input {
      width: 100%;
      min-height: 46px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 16px;
      background: white;
      outline: none;
    }

    select:focus,
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: white;
      cursor: pointer;
      margin-bottom: 6px;
    }

    .checkbox-label input {
      width: auto;
      min-height: 0;
      transform: scale(1.15);
      accent-color: var(--accent);
    }

    .mini-hint { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.45; }

    button {
      appearance: none;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--violet));
      color: white;
      font-weight: 950;
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.14s, filter 0.2s, box-shadow 0.2s;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24);
    }

    button:hover { transform: translateY(-1px); filter: brightness(0.98); }
    button.secondary { background: #111827; box-shadow: 0 8px 18px rgba(17, 24, 39, 0.16); }
    button.ghost { background: white; color: var(--text); border: 1px solid var(--border); box-shadow: none; }
    button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }

    .hidden { display: none !important; }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

    .explain-box {
      margin-top: 18px;
      padding: 16px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      color: var(--muted);
      line-height: 1.7;
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: white;
      color: var(--muted);
      font-weight: 850;
      font-size: 14px;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    .timer-pill { color: #1d4ed8; background: #eff6ff; border-color: #bfdbfe; }
    .timer-danger { color: #991b1b; background: #fef2f2; border-color: #fecaca; }

    .progress-wrap {
      width: 100%;
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin: 10px 0 22px;
    }

    .progress {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      transition: width 0.25s ease;
    }

    .question-title { color: var(--muted); font-weight: 950; margin-bottom: 8px; }
    .question-extra { color: var(--muted); font-weight: 900; margin: -4px 0 14px; line-height: 1.6; }

    .question-main {
      font-size: clamp(18px, 2vw, 26px);
      line-height: 1.22;
      font-weight: 850;
      letter-spacing: normal;
      margin: 12px 0 24px;
      overflow-wrap: anywhere;
      text-align: left;
    }

    .math-render { display: inline-block; }
    .question-main.math-render { display: block; width: 100%; overflow-x: auto; padding: 2px 0; }
    .question-main .katex { font-size: 1em; line-height: 1.12; }
    .option .katex { font-size: 1.1em; line-height: 1.25; }
    .chain-math .katex, .answer-math .katex, .feedback-math .katex, .sample-math .katex, .wrong-math .katex { font-size: 1.06em; line-height: 1.25; }
    .math-render .katex { color: #0f172a; }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .option {
      border: 2px solid var(--border);
      background: white;
      color: var(--text);
      box-shadow: none;
      border-radius: 18px;
      min-height: 64px;
      font-size: 20px;
      text-align: center;
      padding: 12px;
      overflow-wrap: anywhere;
    }

    .option:hover { border-color: var(--accent); background: #f8fbff; }
    .option.correct { border-color: rgba(22, 163, 74, 0.5); background: #ecfdf5; color: #065f46; }
    .option.wrong { border-color: rgba(220, 38, 38, 0.5); background: #fef2f2; color: #991b1b; }
    .option.correct .katex { color: #065f46; }
    .option.wrong .katex { color: #991b1b; }

    .feedback { min-height: 30px; font-weight: 950; margin: 8px 0 16px; }
    .feedback.good { color: var(--good); }
    .feedback.bad { color: var(--bad); }
    .feedback.bad .katex { color: #dc2626; }

    .solution-box {
      margin: 14px 0 18px;
      padding: 18px;
      border-radius: 20px;
      border: 1px solid #dbeafe;
      background: linear-gradient(180deg, #f8fbff, #fff);
      color: #1f2937;
      line-height: 1.7;
    }

    .solution-box h4 { margin: 0 0 12px; font-size: 18px; }
    .solution-chain { background: white; border: 1px solid #e5e7eb; border-radius: 16px; padding: 14px 16px; overflow-x: auto; }

    .chain-line {
      display: grid;
      grid-template-columns: minmax(250px, 1fr) minmax(170px, 0.65fr);
      align-items: baseline;
      gap: 18px;
      margin: 8px 0;
      font-size: 17px;
      font-weight: 850;
      white-space: nowrap;
    }

    .chain-note { color: #64748b; font-size: 13px; font-weight: 850; white-space: normal; }
    .solution-answer { margin-top: 12px; font-weight: 950; color: #111827; }
    .solution-answer > .answer-math { display: inline-block; background: #ecfdf5; color: #065f46; border: 1px solid #bbf7d0; border-radius: 999px; padding: 3px 10px; margin-left: 4px; vertical-align: middle; }

    .result-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; margin: 18px 0 24px; }
    .stat { background: #f9fafb; border: 1px solid var(--border); border-radius: 18px; padding: 18px; }
    .stat .num { font-size: 34px; font-weight: 950; letter-spacing: -0.05em; }
    .stat .label { color: var(--muted); margin-top: 4px; font-weight: 850; }
    .wrong-list { display: grid; gap: 14px; }
    .wrong-item { border: 1px solid var(--border); border-radius: 18px; background: white; padding: 16px; }
    .wrong-item .expr { font-size: 22px; font-weight: 950; margin-bottom: 8px; overflow-wrap: anywhere; }
    .wrong-item p { margin: 6px 0; color: var(--muted); line-height: 1.6; }
    .tag-good { color: var(--good); font-weight: 950; }
    .tag-bad { color: var(--bad); font-weight: 950; }

    @media (max-width: 760px) {
      .mc-site-shell { border-radius: 22px; align-items: flex-start; flex-direction: column; }
      .mc-links { justify-content: flex-start; }
      .setup-grid, .options, .result-grid { grid-template-columns: 1fr; }
      .card { padding: 18px; }
      .container { width: min(100% - 22px, 1040px); padding-top: 26px; }
      .chain-line { grid-template-columns: 1fr; gap: 2px; white-space: normal; }
      .chain-note { padding-left: 12px; }
    }
  
    .operator-note {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #475569;
      font-weight: 900;
      margin-top: -8px;
      margin-bottom: 14px;
    }
    .small-code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-weight: 950;
      color: #1d4ed8;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 999px;
      padding: 2px 8px;
    }

  

  /* MathComplete Lab shared tool question layout override */
  .question-main,
  .expression,
  .equation {
    max-width: 100%;
    font-size: clamp(28px, 5.4vw, 54px) !important;
    line-height: 1.2 !important;
    font-weight: 500 !important;
    letter-spacing: -0.045em !important;
    margin: 10px 0 24px !important;
    text-align: left !important;
    overflow-wrap: anywhere !important;
    word-break: normal !important;
    text-wrap: pretty;
    white-space: normal;
    justify-content: flex-start !important;
    align-items: flex-start !important;
  }

  .question-main.math-render,
  .expression.math-render,
  .equation.math-render {
    display: block !important;
    width: 100% !important;
    text-align: left !important;
  }

  .question-main .katex,
  .expression .katex,
  .equation .katex {
    white-space: normal !important;
    text-align: left !important;
    font-weight: 400 !important;
  }

  .question-main .katex *,
  .expression .katex *,
  .equation .katex * {
    font-weight: 400 !important;
  }

  .question-line,
  .question-text {
    max-width: 100%;
    text-align: left !important;
    overflow-wrap: anywhere;
    word-break: normal;
    text-wrap: pretty;
  }
</style>
</head>
<body>
  <nav class="mc-site-shell">
    <a class="mc-brand" href="../index.html"><span class="mc-brand-mark">∑</span><span>MathComplete Lab</span></a>
    <div class="mc-links">
      <a class="mc-link" href="../practice.html" data-i18n="navPractice">Practice Library</a>
      <a class="mc-link primary" href="../index.html" data-i18n="navHome">Home</a>
    </div>
  </nav>

  <main class="container">
    <header>
      <div class="eyebrow"><span class="eyebrow-dot"></span><span id="toolBadge"></span></div>
      <h1 id="pageTitle"></h1>
      <p id="pageSubtitle" class="subtitle"></p>
    </header>

    <section id="setupCard" class="card">
      <h2 id="setupTitle"></h2>
      <div class="setup-grid">
        <div><label id="difficultyLabel" for="difficulty"></label><select id="difficulty"></select></div>
        <div class="mcl-tool-mode-field">
          <label id="toolModeLabel" for="toolMode">Practice mode</label>
          <select id="toolMode">
            <option value="practice">Practice Mode</option>
            <option value="learn" selected>Learn Mode</option>
            <option value="exam">Exam Mode</option>
          </select>
          <p class="mcl-tool-mode-hint" id="mclToolModeHint">Every answer shows the solution, then you move on manually.</p>
        </div>
        <div><label id="questionCountLabel" for="questionCount"></label><input id="questionCount" type="number" min="1" max="100" value="10" /></div>
        <div><label id="optionCountLabel" for="optionCount"></label><select id="optionCount"></select></div>
        <div><label class="checkbox-label" for="timedMode"><input id="timedMode" type="checkbox" /><span id="timedModeText"></span></label><p id="timedModeHint" class="mini-hint"></p></div>
        <div><label id="timerLevelLabel" for="timerLevel"></label><select id="timerLevel"></select></div>
      </div>
      <div class="actions"><button id="startBtn"></button><button id="sampleBtn" class="ghost"></button></div>
      <div id="sampleBox" class="explain-box hidden"></div>
      <div id="noteBox" class="explain-box"></div>
    </section>

    <section id="quizCard" class="card hidden">
      <div class="topbar">
        <div><span class="pill" id="progressText"></span><span class="pill" id="difficultyText"></span><span class="pill timer-pill hidden" id="timerDisplay"></span></div>
        <button id="quitBtn" class="ghost"></button>
      </div>
      <div class="progress-wrap"><div id="progressBar" class="progress"></div></div>
      <div id="questionTitle" class="question-title"></div>
      <div id="questionExtra" class="question-extra"></div>
      <div id="questionMain" class="question-main"></div>
      <div id="options" class="options"></div>
      <div id="feedback" class="feedback"></div>
      <div id="solutionBox" class="solution-box hidden"></div>
      <div class="actions"><button id="nextBtn" disabled></button></div>
    </section>

    <section id="resultCard" class="card hidden">
      <h2 id="resultTitle"></h2>
      <div class="result-grid">
        <div class="stat"><div id="scoreNum" class="num">0/0</div><div id="scoreLabel" class="label"></div></div>
        <div class="stat"><div id="accuracyNum" class="num">0%</div><div id="accuracyLabel" class="label"></div></div>
        <div class="stat"><div id="wrongNum" class="num">0</div><div id="wrongLabel" class="label"></div></div>
      </div>
      <h3 id="wrongReviewTitle"></h3>
      <div id="wrongList" class="wrong-list"></div>
      <div class="actions" style="margin-top:22px;"><button id="restartBtn"></button><button id="reviewWrongBtn" class="secondary"></button></div>
    </section>
  </main>


  <script>

        type: "scalar-multiple",
        promptKey: "promptProperty",
        main: mainLines([`A: ${n}\\times ${n}`, `\\det(A)=${det}`, `\\det(${k}A)=?`]),
        answer: scalarOption(ans),
        lines: [line(`\\det(kA)=k^n\\det(A)`, "scalarMultiple"), line(`\\det(${k}A)=${k}^{${n}}\\cdot ${det}=${ans}`, "final")],
        distractors: scalarDistractors(ans, [k*det, (k**(n-1))*det, det])
      });
    }
    function qProductProperty() {
      const da=randNonzero(-6,6), db=randNonzero(-6,6), ans=da*db;
      return makeQuestion({ difficulty: "expert", type: "product-property", promptKey: "promptProperty", main: `\\det(A)=${da},\\quad \\det(B)=${db}.\\quad \\det(AB)=?`, answer: scalarOption(ans), lines: [line(`\\det(AB)=\\det(A)\\det(B)`, "product"), line(`=${da}\\cdot ${db}=${ans}`, "final")], distractors: scalarDistractors(ans, [da+db, da-db, -ans]) });
    }
    function qTransposeProperty() {
      const det=randNonzero(-9,9);
      return makeQuestion({ difficulty: "expert", type: "transpose-property", promptKey: "promptProperty", main: `\\det(A)=${det}.\\quad \\det(A^T)=?`, answer: scalarOption(det), lines: [line(`\\det(A^T)=\\det(A)`, "transpose"), line(`\\det(A^T)=${det}`, "final")], distractors: scalarDistractors(det, [-det, det+1, 0]) });
    }
    function qFalseStatement() {
      const correct = textOption("propertyStatement", "falseScalar");
      return makeQuestion({
        difficulty: "expert",
        type: "false-statement",
        promptKey: "promptStatement",
        main: txt("Choose the statement that is always false.", "选择一个恒为假的说法。"),
        answer: correct,
        lines: [line(`\\det(kA)=k^n\\det(A), ${txt("not usually", "通常不是")} k\\det(A).`, "property")],
        distractors: [textOption("propertyStatement", "trueTranspose"), textOption("propertyStatement", "trueProduct"), textOption("propertyStatement", "trueZeroInvert"), textOption("propertyStatement", "trueTriangular"), textOption("propertyStatement", "trueSwap")]
      });
    }

    const BUILDERS = {
      easy: [qDet2Basic, qDet2Negative, qDefined, qTriangular2],
      medium: [qDet3Formula, qDet3Sarrus, qDet3Zeros, qTriangular3, qInvertibility],
      hard: [qDet3Negative, qUnknown2x2, qDependentRows, qRowSwap, qRowScale],
      expert: [qMultiStepProperty, qScalarMultiple, qProductProperty, qTransposeProperty, qFalseStatement]
    };
    const BUILDER_TYPES = new Map();
    Object.values(BUILDERS).flat().forEach(fn => { const q = fn(); BUILDER_TYPES.set(q.type, fn); });

    function buildQuestion(difficulty, forcedType = null) {
      let builders = BUILDERS[difficulty] || BUILDERS.medium;
      if (forcedType && BUILDER_TYPES.has(forcedType)) builders = [BUILDER_TYPES.get(forcedType)];
      for (let i = 0; i < 50; i++) {
        const q = choose(builders)();
        q.options = generateOptions(q, Number(optionCountEl.value || 4));
        return q;
      }
      return BUILDERS.easy[0]();
    }
    function buildDifficultyPlan(count, difficulty) { if (difficulty !== "mixed") return Array(count).fill(difficulty); const plan = []; while (plan.length < count) plan.push(...shuffle(REAL_DIFFICULTIES)); return plan.slice(0, count); }
    function pickDifficultyForSample(difficulty) { return difficulty === "mixed" ? choose(REAL_DIFFICULTIES) : difficulty; }
    function clearTimer() { if (timerId !== null) { clearInterval(timerId); timerId = null; } }
    function updateTimerControls() { timerLevelEl.disabled = !timedModeEl.checked; }
    function updateTimerDisplay() { if (!timedModeEl.checked || quizCard.classList.contains("hidden")) { timerDisplay.classList.add("hidden"); return; } timerDisplay.classList.remove("hidden"); timerDisplay.textContent = tr().timerDisplay(timeLeft); timerDisplay.classList.toggle("timer-danger", timeLeft <= 10); }
    function startTimerForQuestion() { clearTimer(); if (!timedModeEl.checked) { timerDisplay.classList.add("hidden"); return; } timeLeft = TIMER_DURATIONS[timerLevelEl.value] || 60; updateTimerDisplay(); timerId = setInterval(() => { timeLeft -= 1; updateTimerDisplay(); if (timeLeft <= 0) handleTimeUp(); }, 1000); }
    function applyLanguage() {
      lang = readGlobalLanguage();
      const t = tr();
      document.documentElement.lang = t.htmlLang;
      document.title = t.title;
      document.querySelectorAll("[data-i18n]").forEach(el => { const key = el.getAttribute("data-i18n"); if (t[key]) el.textContent = t[key]; });
      document.getElementById("toolBadge").textContent = t.toolBadge;
      document.getElementById("pageTitle").textContent = t.title;
      document.getElementById("pageSubtitle").textContent = t.subtitle;
      document.getElementById("setupTitle").textContent = t.setupTitle;
      document.getElementById("difficultyLabel").textContent = t.difficultyLabel;
      document.getElementById("questionCountLabel").textContent = t.questionCountLabel;
      document.getElementById("optionCountLabel").textContent = t.optionCountLabel;
      document.getElementById("timedModeText").textContent = t.timedModeText;
      document.getElementById("timedModeHint").textContent = t.timedModeHint;
      document.getElementById("timerLevelLabel").textContent = t.timerLevelLabel;
      startBtn.textContent = t.startBtn; sampleBtn.textContent = t.sampleBtn; quitBtn.textContent = t.quitBtn;
      nextBtn.textContent = answered && currentIndex === quiz.length - 1 ? t.resultBtn : t.nextBtn;
      document.getElementById("resultTitle").textContent = t.resultTitle;
      document.getElementById("scoreLabel").textContent = t.scoreLabel;
      document.getElementById("accuracyLabel").textContent = t.accuracyLabel;
      document.getElementById("wrongLabel").textContent = t.wrongLabel;
      document.getElementById("wrongReviewTitle").textContent = t.wrongReviewTitle;
      restartBtn.textContent = t.restartBtn; reviewWrongBtn.textContent = t.reviewWrongBtn; noteBox.textContent = t.note;
      const selectedDifficulty = difficultyEl.value || "medium";
      difficultyEl.innerHTML = ["easy", "medium", "hard", "expert", "mixed"].map(key => `<option value="${key}">${t.difficultyOptions[key]}</option>`).join("");
      difficultyEl.value = selectedDifficulty;
      const selectedOptionCount = optionCountEl.value || "4";
      optionCountEl.innerHTML = [4,5,6].map(n => `<option value="${n}">${t.optionCount(n)}</option>`).join("");
      optionCountEl.value = selectedOptionCount;
      const selectedTimer = timerLevelEl.value || "timer_medium";
      timerLevelEl.innerHTML = ["timer_easy", "timer_medium", "timer_hard", "timer_expert"].map(key => `<option value="${key}">${t.timerOptions[key]}</option>`).join("");
      timerLevelEl.value = selectedTimer;
      updateTimerControls();
      if (!quizCard.classList.contains("hidden") && quiz.length) renderQuestion(false);
      if (!resultCard.classList.contains("hidden")) renderResultBody();
    }
    function renderQuestion(resetTimer = true) {
      const q = quiz[currentIndex]; answered = false;
      qTitle.textContent = tr().questionTitle;
      qExtra.textContent = tr()[q.promptKey] || tr().promptCompute;
      qMain.innerHTML = ""; qMain.classList.remove("math-render"); renderLatex(qMain, q.main, false);
      optionsEl.innerHTML = ""; feedbackEl.textContent = ""; feedbackEl.className = "feedback"; solutionBox.classList.add("hidden"); solutionBox.innerHTML = "";
      q.options.forEach(option => { const btn = document.createElement("button"); btn.type = "button"; btn.className = "option"; btn.dataset.answerKey = optKey(option); renderOptionElement(btn, option); btn.addEventListener("click", () => chooseOption(btn, option)); optionsEl.appendChild(btn); });
      progressText.textContent = tr().progress(currentIndex + 1, quiz.length);
      difficultyText.textContent = tr().difficulties[q.difficulty];
      progressBar.style.width = `${(currentIndex / quiz.length) * 100}%`;
      nextBtn.textContent = currentIndex === quiz.length - 1 ? tr().resultBtn : tr().nextBtn;
      nextBtn.disabled = true;
      if (resetTimer) startTimerForQuestion(); else updateTimerDisplay();
    }
    function renderFeedback(isCorrect, correctOption, timeUp) { feedbackEl.className = `feedback ${isCorrect ? "good" : "bad"}`; if (isCorrect) feedbackEl.textContent = tr().correctFeedback; else { feedbackEl.innerHTML = `${timeUp ? tr().timeUpPrefix : tr().incorrectPrefix} ${optionToHtml(correctOption, "feedback-math")}`; renderTaggedMath(feedbackEl); } }
    function renderSolutionBox() {
      const q = quiz[currentIndex]; if (!q) { solutionBox.classList.add("hidden"); solutionBox.innerHTML = ""; return; }
      solutionBox.classList.remove("hidden");
      solutionBox.innerHTML = `<h4>${tr().solutionTitle}</h4><div class="solution-chain">${q.lines.map(step => `<div class="chain-line">${mathSpan(step.line, "chain-math")}<span class="chain-note">${escapeHtml(tr().notes[step.noteKey] || step.noteKey || "")}</span></div>`).join("")}</div><div class="solution-answer">${tr().solutionFinal} ${optionToHtml(q.answer, "answer-math")}</div>`;
      renderTaggedMath(solutionBox);
    }
    function recordAttempt(q, correctDisplay, selectedDisplay, isCorrect, timeUp = false) { void window.MCLProgress?.recordGameAttempt?.({ gameId: TOOL_CONFIG.gameId, question: { plain: q.plain, type: q.type, difficulty: q.difficulty }, course: TOOL_CONFIG.course, topic: q.type, correctAnswer: correctDisplay, selectedAnswer: selectedDisplay, isCorrect, timeUp }); }
    function chooseOption(button, selected) {
      if (answered) return; answered = true; clearTimer();
      const q = quiz[currentIndex]; const isCorrect = isSameAnswer(selected, q.answer);
      [...optionsEl.querySelectorAll(".option")].forEach(btn => { btn.disabled = true; if (btn.dataset.answerKey === optKey(q.answer)) btn.classList.add("correct"); });
      if (isCorrect) { correctCount += 1; renderFeedback(true, q.answer, false); } else { button.classList.add("wrong"); renderFeedback(false, q.answer, false); wrongAnswers.push({ main: q.plain, answer: optionText(q.answer), selected: optionText(selected), type: q.type, difficulty: q.difficulty }); }
      recordAttempt(q, optionText(q.answer), optionText(selected), isCorrect, false);
      renderSolutionBox(); nextBtn.disabled = false; progressBar.style.width = `${((currentIndex + 1) / quiz.length) * 100}%`;
    }
    function handleTimeUp() {
      if (answered) return; clearTimer(); answered = true;
      const q = quiz[currentIndex]; [...optionsEl.querySelectorAll(".option")].forEach(btn => { btn.disabled = true; if (btn.dataset.answerKey === optKey(q.answer)) btn.classList.add("correct"); });
      renderFeedback(false, q.answer, true); wrongAnswers.push({ main: q.plain, answer: optionText(q.answer), selected: null, timeUp: true, type: q.type, difficulty: q.difficulty });
      recordAttempt(q, optionText(q.answer), "", false, true); renderSolutionBox(); nextBtn.disabled = false; progressBar.style.width = `${((currentIndex + 1) / quiz.length) * 100}%`;
    }
    function nextQuestion() { if (!answered) return; if (currentIndex < quiz.length - 1) { currentIndex += 1; renderQuestion(true); } else showResult(); }
    function showResult() { clearTimer(); quizCard.classList.add("hidden"); resultCard.classList.remove("hidden"); renderResultBody(); }
    function renderResultBody() {
      const total = quiz.length; const accuracy = total ? Math.round((correctCount / total) * 100) : 0;
      scoreNum.textContent = `${correctCount}/${total}`; accuracyNum.textContent = `${accuracy}%`; wrongNum.textContent = String(wrongAnswers.length);
      if (!wrongAnswers.length) { wrongList.innerHTML = `<div class="wrong-item"><div class="expr">${escapeHtml(tr().noWrong)}</div><p>${escapeHtml(tr().noWrongTip)}</p></div>`; reviewWrongBtn.disabled = true; return; }
      reviewWrongBtn.disabled = false;
      wrongList.innerHTML = wrongAnswers.map(item => `<div class="wrong-item"><div class="expr">${mathSpan(item.main, "wrong-math")}</div><p><span class="tag-bad">${escapeHtml(tr().yourAnswer)}:</span> ${escapeHtml(item.timeUp ? tr().timeUpAnswer : item.selected)}</p><p><span class="tag-good">${escapeHtml(tr().correctAnswer)}:</span> ${escapeHtml(item.answer)}</p></div>`).join("");
      renderTaggedMath(wrongList);
    }
    function startRound(forcedTypes = null) {
      clearTimer(); const difficulty = difficultyEl.value || "medium"; const count = Math.max(1, Math.min(100, Number(questionCountEl.value || 10))); questionCountEl.value = String(count);
      const plan = buildDifficultyPlan(count, difficulty); quiz = plan.map((diff, i) => buildQuestion(diff, forcedTypes ? forcedTypes[i % forcedTypes.length] : null));
      currentIndex = 0; correctCount = 0; wrongAnswers = [];
      setupCard.classList.add("hidden"); resultCard.classList.add("hidden"); quizCard.classList.remove("hidden"); renderQuestion(true);
    }
    function showSample() {
      const diff = pickDifficultyForSample(difficultyEl.value || "medium"); const q = buildQuestion(diff);
      sampleBox.classList.remove("hidden");
      sampleBox.innerHTML = `<strong>${tr().sampleTitle}</strong><br>${escapeHtml(tr().sampleQuestion)}: ${mathSpan(q.main, "sample-math")}<br>${escapeHtml(tr().sampleAnswer)}: ${optionToHtml(q.answer, "sample-math")}<br>${escapeHtml(tr().sampleOptions)}: ${q.options.map(opt => opt.code ? escapeHtml(optionText(opt)) : mathSpan(opt.latex, "sample-math")).join(" &nbsp; ")}`;
      renderTaggedMath(sampleBox);
    }
    function reviewWrongTypes() { if (!wrongAnswers.length) return; const types = [...new Set(wrongAnswers.map(x => x.type))]; startRound(types); }
    function resetToSetup() { clearTimer(); quizCard.classList.add("hidden"); resultCard.classList.add("hidden"); setupCard.classList.remove("hidden"); progressBar.style.width = "0%"; }

    startBtn.addEventListener("click", () => startRound());
    sampleBtn.addEventListener("click", showSample);
    nextBtn.addEventListener("click", nextQuestion);
    quitBtn.addEventListener("click", showResult);
    restartBtn.addEventListener("click", resetToSetup);
    reviewWrongBtn.addEventListener("click", reviewWrongTypes);
    timedModeEl.addEventListener("change", updateTimerControls);
    window.addEventListener("storage", event => { if (event.key === "mathcomplete_lang") applyLanguage(); });
    applyLanguage();
  </script>
  <script src="../assets/js/tool-modes.js"></script>
  <script src="../assets/js/home-link.js"></script>
</body>
