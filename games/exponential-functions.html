<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exponential Function Practice</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/auth-ui.js"></script>
  <script src="../assets/js/progress.js"></script>
  <style>
    :root {
      --bg: #f7f7fb;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e5e7eb;
      --accent: #2563eb;
      --violet: #7c3aed;
      --good: #16a34a;
      --bad: #dc2626;
      --shadow: 0 18px 42px rgba(15, 23, 42, 0.10);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.35), transparent 34%),
        radial-gradient(circle at top right, rgba(167, 139, 250, 0.28), transparent 32%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 52%, #ffffff 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.42;
      background-image:
        linear-gradient(rgba(15, 23, 42, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, 0.045) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(180deg, black, transparent 72%);
    }

    .mc-site-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 18px auto 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.74);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.84);
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.10);
      position: sticky;
      top: 12px;
      z-index: 20;
    }

    .mc-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #0f172a;
      font-weight: 950;
      text-decoration: none;
      letter-spacing: -0.035em;
      white-space: nowrap;
    }

    .mc-brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: white;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.28);
    }

    .mc-links {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .mc-link {
      color: #475569;
      text-decoration: none;
      font-weight: 850;
      padding: 8px 11px;
      border-radius: 999px;
      transition: background 0.2s, color 0.2s;
    }

    .mc-link:hover { color: #1d4ed8; background: #eff6ff; }
    .mc-link.primary { color: white; background: #0f172a; }
    .mc-link.primary:hover { color: white; background: #1e293b; }

    .container {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 38px 0 68px;
      position: relative;
    }

    header { margin-bottom: 24px; overflow: visible; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      color: #1d4ed8;
      background: rgba(239, 246, 255, 0.86);
      border: 1px solid rgba(191, 219, 254, 0.8);
      font-weight: 950;
      margin-bottom: 14px;
    }

    .eyebrow-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #10b981;
      box-shadow: 0 0 0 6px rgba(16, 185, 129, 0.12);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5.2vw, 56px);
      line-height: 1.16;
      letter-spacing: -0.055em;
      background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 48%, #7c3aed 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      padding-bottom: 0.18em;
      overflow: visible;
    }

    h2 { margin: 0 0 12px; font-size: clamp(24px, 4vw, 34px); letter-spacing: -0.045em; }
    h3 { margin: 0 0 8px; letter-spacing: -0.025em; }

    .subtitle {
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.75;
      max-width: 780px;
      font-size: 17px;
    }

    .card {
      background: rgba(255, 255, 255, 0.90);
      border: 1px solid rgba(255, 255, 255, 0.76);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      backdrop-filter: blur(16px);
    }

    .setup-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin: 22px 0;
    }

    label { display: block; font-weight: 900; margin-bottom: 8px; }

    select,
    input {
      width: 100%;
      min-height: 46px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 16px;
      background: white;
      outline: none;
    }

    select:focus,
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: white;
      cursor: pointer;
      margin-bottom: 6px;
    }

    .checkbox-label input {
      width: auto;
      min-height: 0;
      transform: scale(1.15);
      accent-color: var(--accent);
    }

    .mini-hint { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.45; }

    button {
      appearance: none;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--violet));
      color: white;
      font-weight: 950;
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.14s, filter 0.2s, box-shadow 0.2s;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24);
    }

    button:hover { transform: translateY(-1px); filter: brightness(0.98); }
    button.secondary { background: #111827; box-shadow: 0 8px 18px rgba(17, 24, 39, 0.16); }
    button.ghost { background: white; color: var(--text); border: 1px solid var(--border); box-shadow: none; }
    button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }

    .hidden { display: none !important; }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

    .explain-box {
      margin-top: 18px;
      padding: 16px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      color: var(--muted);
      line-height: 1.7;
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: white;
      color: var(--muted);
      font-weight: 850;
      font-size: 14px;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    .timer-pill { color: #1d4ed8; background: #eff6ff; border-color: #bfdbfe; }
    .timer-danger { color: #991b1b; background: #fef2f2; border-color: #fecaca; }

    .progress-wrap {
      width: 100%;
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin: 10px 0 22px;
    }

    .progress {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      transition: width 0.25s ease;
    }

    .question-title { color: var(--muted); font-weight: 950; margin-bottom: 8px; }
    .question-extra { color: var(--muted); font-weight: 900; margin: -4px 0 14px; line-height: 1.6; }

    .question-main {
      font-size: clamp(28px, 5.4vw, 54px);
      line-height: 1.2;
      font-weight: 950;
      letter-spacing: -0.045em;
      margin: 10px 0 24px;
      overflow-wrap: anywhere;
    }

    .math-render { display: inline-block; }
    .question-main.math-render { display: block; width: 100%; }
    .question-main .katex { font-size: 1.08em; line-height: 1.2; }
    .option .katex { font-size: 1.1em; line-height: 1.25; }
    .chain-math .katex, .answer-math .katex, .feedback-math .katex, .sample-math .katex, .wrong-math .katex { font-size: 1.06em; line-height: 1.25; }
    .math-render .katex { color: #0f172a; }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .option {
      border: 2px solid var(--border);
      background: white;
      color: var(--text);
      box-shadow: none;
      border-radius: 18px;
      min-height: 64px;
      font-size: 20px;
      text-align: center;
      padding: 12px;
      overflow-wrap: anywhere;
    }

    .option:hover { border-color: var(--accent); background: #f8fbff; }
    .option.correct { border-color: rgba(22, 163, 74, 0.5); background: #ecfdf5; color: #065f46; }
    .option.wrong { border-color: rgba(220, 38, 38, 0.5); background: #fef2f2; color: #991b1b; }
    .option.correct .katex { color: #065f46; }
    .option.wrong .katex { color: #991b1b; }

    .feedback { min-height: 30px; font-weight: 950; margin: 8px 0 16px; }
    .feedback.good { color: var(--good); }
    .feedback.bad { color: var(--bad); }
    .feedback.bad .katex { color: #dc2626; }

    .solution-box {
      margin: 14px 0 18px;
      padding: 18px;
      border-radius: 20px;
      border: 1px solid #dbeafe;
      background: linear-gradient(180deg, #f8fbff, #fff);
      color: #1f2937;
      line-height: 1.7;
    }

    .solution-box h4 { margin: 0 0 12px; font-size: 18px; }
    .solution-chain { background: white; border: 1px solid #e5e7eb; border-radius: 16px; padding: 14px 16px; overflow-x: auto; }

    .chain-line {
      display: grid;
      grid-template-columns: minmax(250px, 1fr) minmax(170px, 0.65fr);
      align-items: baseline;
      gap: 18px;
      margin: 8px 0;
      font-size: 17px;
      font-weight: 850;
      white-space: nowrap;
    }

    .chain-note { color: #64748b; font-size: 13px; font-weight: 850; white-space: normal; }
    .solution-answer { margin-top: 12px; font-weight: 950; color: #111827; }
    .solution-answer > .answer-math { display: inline-block; background: #ecfdf5; color: #065f46; border: 1px solid #bbf7d0; border-radius: 999px; padding: 3px 10px; margin-left: 4px; vertical-align: middle; }

    .result-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; margin: 18px 0 24px; }
    .stat { background: #f9fafb; border: 1px solid var(--border); border-radius: 18px; padding: 18px; }
    .stat .num { font-size: 34px; font-weight: 950; letter-spacing: -0.05em; }
    .stat .label { color: var(--muted); margin-top: 4px; font-weight: 850; }
    .wrong-list { display: grid; gap: 14px; }
    .wrong-item { border: 1px solid var(--border); border-radius: 18px; background: white; padding: 16px; }
    .wrong-item .expr { font-size: 22px; font-weight: 950; margin-bottom: 8px; overflow-wrap: anywhere; }
    .wrong-item p { margin: 6px 0; color: var(--muted); line-height: 1.6; }
    .tag-good { color: var(--good); font-weight: 950; }
    .tag-bad { color: var(--bad); font-weight: 950; }

    @media (max-width: 760px) {
      .mc-site-shell { border-radius: 22px; align-items: flex-start; flex-direction: column; }
      .mc-links { justify-content: flex-start; }
      .setup-grid, .options, .result-grid { grid-template-columns: 1fr; }
      .card { padding: 18px; }
      .container { width: min(100% - 22px, 1040px); padding-top: 26px; }
      .chain-line { grid-template-columns: 1fr; gap: 2px; white-space: normal; }
      .chain-note { padding-left: 12px; }
    }
  

  /* MathComplete Lab shared tool question layout override */
  .question-main,
  .expression,
  .equation {
    max-width: 100%;
    font-size: clamp(28px, 5.4vw, 54px) !important;
    line-height: 1.2 !important;
    font-weight: 500 !important;
    letter-spacing: -0.045em !important;
    margin: 10px 0 24px !important;
    text-align: left !important;
    overflow-wrap: anywhere !important;
    word-break: normal !important;
    text-wrap: pretty;
    white-space: normal;
    justify-content: flex-start !important;
    align-items: flex-start !important;
  }

  .question-main.math-render,
  .expression.math-render,
  .equation.math-render {
    display: block !important;
    width: 100% !important;
    text-align: left !important;
  }

  .question-main .katex,
  .expression .katex,
  .equation .katex {
    white-space: normal !important;
    text-align: left !important;
    font-weight: 400 !important;
  }

  .question-main .katex *,
  .expression .katex *,
  .equation .katex * {
    font-weight: 400 !important;
  }

  .question-line,
  .question-text {
    max-width: 100%;
    text-align: left !important;
    overflow-wrap: anywhere;
    word-break: normal;
    text-wrap: pretty;
  }

  .question-main.long-text-question {
    max-width: 980px;
    font-size: clamp(24px, 3.1vw, 36px) !important;
    line-height: 1.32 !important;
    letter-spacing: 0 !important;
    overflow-wrap: break-word !important;
    word-break: normal !important;
  }
</style>
</head>
<body>
  <nav class="mc-site-shell">
    <a class="mc-brand" href="../index.html"><span class="mc-brand-mark">∑</span><span>MathComplete Lab</span></a>
    <div class="mc-links">
      <a class="mc-link" href="../practice.html" data-i18n="navPractice">Practice Library</a>
      <a class="mc-link primary" href="../index.html" data-i18n="navHome">Home</a>
    </div>
  </nav>

  <main class="container">
    <header>
      <div class="eyebrow"><span class="eyebrow-dot"></span><span id="toolBadge"></span></div>
      <h1 id="pageTitle"></h1>
      <p id="pageSubtitle" class="subtitle"></p>
    </header>

    <section id="setupCard" class="card">
      <h2 id="setupTitle"></h2>
      <div class="setup-grid">
        <div><label id="difficultyLabel" for="difficulty"></label><select id="difficulty"></select></div>
        <div class="mcl-tool-mode-field">
          <label id="toolModeLabel" for="toolMode">Practice mode</label>
          <select id="toolMode">
            <option value="practice">Practice Mode</option>
            <option value="learn" selected>Learn Mode</option>
            <option value="exam">Exam Mode</option>
          </select>
          <p class="mcl-tool-mode-hint" id="mclToolModeHint">Every answer shows the solution, then you move on manually.</p>
        </div>
        <div><label id="questionCountLabel" for="questionCount"></label><input id="questionCount" type="number" min="1" max="100" value="10" /></div>
        <div><label id="optionCountLabel" for="optionCount"></label><select id="optionCount"></select></div>
        <div><label class="checkbox-label" for="timedMode"><input id="timedMode" type="checkbox" /><span id="timedModeText"></span></label><p id="timedModeHint" class="mini-hint"></p></div>
        <div><label id="timerLevelLabel" for="timerLevel"></label><select id="timerLevel"></select></div>
      </div>
      <div class="actions"><button id="startBtn"></button><button id="sampleBtn" class="ghost"></button></div>
      <div id="sampleBox" class="explain-box hidden"></div>
      <div id="noteBox" class="explain-box"></div>
    </section>

    <section id="quizCard" class="card hidden">
      <div class="topbar">
        <div><span class="pill" id="progressText"></span><span class="pill" id="difficultyText"></span><span class="pill timer-pill hidden" id="timerDisplay"></span></div>
        <button id="quitBtn" class="ghost"></button>
      </div>
      <div class="progress-wrap"><div id="progressBar" class="progress"></div></div>
      <div id="questionTitle" class="question-title"></div>
      <div id="questionExtra" class="question-extra"></div>
      <div id="questionMain" class="question-main"></div>
      <div id="options" class="options"></div>
      <div id="feedback" class="feedback"></div>
      <div id="solutionBox" class="solution-box hidden"></div>
      <div class="actions"><button id="nextBtn" disabled></button></div>
    </section>

    <section id="resultCard" class="card hidden">
      <h2 id="resultTitle"></h2>
      <div class="result-grid">
        <div class="stat"><div id="scoreNum" class="num">0/0</div><div id="scoreLabel" class="label"></div></div>
        <div class="stat"><div id="accuracyNum" class="num">0%</div><div id="accuracyLabel" class="label"></div></div>
        <div class="stat"><div id="wrongNum" class="num">0</div><div id="wrongLabel" class="label"></div></div>
      </div>
      <h3 id="wrongReviewTitle"></h3>
      <div id="wrongList" class="wrong-list"></div>
      <div class="actions" style="margin-top:22px;"><button id="restartBtn"></button><button id="reviewWrongBtn" class="secondary"></button></div>
    </section>
  </main>

    function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {

    function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) [a, b] = [b, a % b]; return a || 1; }
    function simplifyFrac(n, d = 1) {
      if (d < 0) { n = -n; d = -d; }
      const g = gcd(n, d);
      return { n: n / g, d: d / g };
    }
    function powInt(a, n) { return Math.round(Math.pow(a, n)); }
    function fracLatex(f) {
      const s = simplifyFrac(f.n, f.d);
      if (s.d === 1) return String(s.n);
      if (s.n < 0) return `-\\frac{${Math.abs(s.n)}}{${s.d}}`;
      return `\\frac{${s.n}}{${s.d}}`;
    }
    function signedInt(n) { return n < 0 ? `-${Math.abs(n)}` : `+${n}`; }
    function signedOutside(n) { return n === 0 ? "" : signedInt(n); }
    function trimNumber(n, places = 2) {
      if (Number.isInteger(n)) return String(n);
      return String(Number(n.toFixed(places)));
    }
    function coefficient(n) {
      if (n === 1) return "";
      if (n === -1) return "-";
      return String(n);
    }
    function expTerm(base, exponent = "x") { return `${base}^{${exponent}}`; }
    function modelLatex(a, b, variable = "x") {
      return `${a === 1 ? "" : a === -1 ? "-" : a}\\cdot ${expTerm(b, variable)}`;
    }
    function modelWithShift(a, b, h = 0, k = 0) {
      const inner = h === 0 ? "x" : h > 0 ? `x-${h}` : `x+${Math.abs(h)}`;
      return `${coefficient(a)}${expTerm(b, inner)}${signedOutside(k)}`;

        .replaceAll("\\", "\\textbackslash ")
        .replaceAll("%", "\\%")
        .replaceAll("&", "\\&")

        .replaceAll("_", "\\_")
        .replaceAll("$", "\\$")

      if (!match) return null;

        .replaceAll("\\%", "%")
        .replaceAll("\\$", "$")
        .replaceAll("\\&", "&")
        .replaceAll("\\_", "_")
        .replaceAll("\\{", "{")

    function makeQuestion(difficulty, type, promptKey, main, answer, lines, distractors) {
      const q = {
        difficulty,
        type,
        promptKey,
        main,
        answer: ans(answer),
        plain: main,
        lines,
        distractors: [...new Set(distractors.filter(Boolean).filter(x => answerKey(ans(x)) !== answerKey(ans(answer))))]
      };
      q.options = generateOptions(q, Number(optionCountEl.value || 4));
      return q;
    }

    function generateOptions(q, count) {
      const correct = q.answer;
      const distractorMap = new Map();
      const add = value => {
        if (value === undefined || value === null || value === "") return;
        const item = ans(value);
        if (answerKey(item) !== answerKey(correct)) distractorMap.set(answerKey(item), item);
      };

      // First priority: every question template provides its own mistake-based choices.
      // Do NOT mix generic numbers like 2 or 10 into every problem; that creates choices
      // that are unrelated to statement, comparison, transformation, or growth/decay questions.
      q.distractors.forEach(add);

      const needed = Math.max(0, count - 1);
      let picked = shuffle([...distractorMap.values()]).slice(0, needed);

      // Only if the selected option count requires more choices do we add same-kind fallbacks.
      // These fallbacks are grouped by prompt/type so numerical answers, statements,
      // comparisons, transformations, and equations do not get mixed together.
      if (picked.length < needed) {
        contextualFallbacks(q).forEach(add);
        const used = new Set(picked.map(item => answerKey(item)));
        const remaining = shuffle([...distractorMap.values()].filter(item => !used.has(answerKey(item))));
        picked = [...picked, ...remaining.slice(0, needed - picked.length)];
      }

      return shuffle([correct, ...picked]);
    }

    function nearbyNumberFallbacks(correct) {
      const n = parseSimpleNumber(correct.latex);
      if (n === null || !Number.isFinite(n)) return [];
      const candidates = [n + 1, n - 1, n + 2, n - 2, n * 2, Math.round(n / 2), -n, 0, 1];
      return candidates
        .filter(x => Number.isFinite(x) && x !== n)
        .map(x => Number.isInteger(x) ? String(x) : trimNumber(x, 2));

    function generateQuestion(difficulty, forcedType = null) {
      const builders = BUILDERS[difficulty] || BUILDERS.medium;
      for (let i = 0; i < 200; i++) {
        const q = choose(builders)();
        if (forcedType && q.type !== forcedType) continue;
        q.options = generateOptions(q, Number(optionCountEl.value || 4));
        return q;
      }
      // If the requested wrong-answer type is not available in this difficulty,
      // fall back to a normal question instead of silently mixing all types.
      const q = choose(builders)();
      q.options = generateOptions(q, Number(optionCountEl.value || 4));
      return q;
    }

    function buildDifficultyPlan(count, difficulty) {
      if (difficulty !== "mixed") return Array(count).fill(difficulty);
      const plan = [];
      while (plan.length < count) plan.push(...shuffle(REAL_DIFFICULTIES));
      return plan.slice(0, count);
    }
    function pickDifficultyForSample(difficulty) { return difficulty === "mixed" ? choose(REAL_DIFFICULTIES) : difficulty; }
    function clearTimer() { if (timerId !== null) { clearInterval(timerId); timerId = null; } }
    function updateTimerControls() { timerLevelEl.disabled = !timedModeEl.checked; }
    function updateTimerDisplay() {
      if (!timedModeEl.checked || quizCard.classList.contains("hidden")) { timerDisplay.classList.add("hidden"); return; }
      timerDisplay.classList.remove("hidden");
      timerDisplay.textContent = tr().timerDisplay(timeLeft);
      timerDisplay.classList.toggle("timer-danger", timeLeft <= 10);
    }
    function startTimerForQuestion() {
      clearTimer();
      if (!timedModeEl.checked) { timerDisplay.classList.add("hidden"); return; }
      timeLeft = TIMER_DURATIONS[timerLevelEl.value] || 60;
      updateTimerDisplay();
      timerId = setInterval(() => {
        timeLeft -= 1;
        updateTimerDisplay();
        if (timeLeft <= 0) handleTimeUp();
      }, 1000);
    }

      document.getElementById("wrongLabel").textContent = t.wrongLabel;
      document.getElementById("wrongReviewTitle").textContent = t.wrongReviewTitle;
      restartBtn.textContent = t.restartBtn;
      reviewWrongBtn.textContent = t.reviewWrongBtn;
      rebuildDifficultyOptions();
      rebuildOptionCountOptions();
      rebuildTimerLevelOptions();
      updateTimerControls();
      if (quiz.length && !quizCard.classList.contains("hidden")) renderQuestion(false);
      if (!resultCard.classList.contains("hidden")) renderResultBody();
      updateTimerDisplay();
    }

    function rebuildDifficultyOptions() {
      const current = difficultyEl.value || "medium";
      difficultyEl.innerHTML = "";
      ["easy", "medium", "hard", "expert", "mixed"].forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = tr().difficultyOptions[value];
        difficultyEl.appendChild(option);
      });
      difficultyEl.value = tr().difficultyOptions[current] ? current : "medium";
    }
    function rebuildOptionCountOptions() {
      const current = optionCountEl.value || "4";
      optionCountEl.innerHTML = "";
      [4, 5, 6].forEach(value => {
        const option = document.createElement("option");
        option.value = String(value);
        option.textContent = tr().optionCount(value);
        optionCountEl.appendChild(option);
      });
      optionCountEl.value = current;
    }
    function rebuildTimerLevelOptions() {
      const current = timerLevelEl.value || "timer_medium";
      timerLevelEl.innerHTML = "";
      ["timer_easy", "timer_medium", "timer_hard", "timer_expert"].forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = tr().timerOptions[value];
        timerLevelEl.appendChild(option);
      });
      timerLevelEl.value = TIMER_DURATIONS[current] ? current : "timer_medium";
    }

    function buildQuiz() {
      const difficulty = difficultyEl.value;
      const count = clamp(Number(questionCountEl.value || 10), 1, 100);
      lastDifficulty = difficulty;
      quiz = buildDifficultyPlan(count, difficulty).map(level => generateQuestion(level));
      currentIndex = 0;
      correctCount = 0;
      wrongAnswers = [];
      answered = false;
      showQuiz();
      renderQuestion(true);
    }
    function buildWrongTypeQuiz() {
      if (!wrongAnswers.length) { alert(tr().noWrongAlert); return; }
      const count = Math.max(wrongAnswers.length * 2, 5);
      quiz = [];
      for (let i = 0; i < count; i++) {
        const source = choose(wrongAnswers);
        const difficulty = lastDifficulty === "mixed" ? source.difficulty : lastDifficulty;
        quiz.push(generateQuestion(difficulty, source.type));
      }
      currentIndex = 0;
      correctCount = 0;
      wrongAnswers = [];
      answered = false;
      showQuiz();
      renderQuestion(true);
    }
    function showQuiz() {
      setupCard.classList.add("hidden");
      resultCard.classList.add("hidden");
      quizCard.classList.remove("hidden");
    }
    function renderQuestion(resetOptions) {
      const q = quiz[currentIndex];
      if (!q) return;
      if (resetOptions) {
        answered = false;
        feedbackEl.textContent = "";
        feedbackEl.className = "feedback";
        solutionBox.classList.add("hidden");
        solutionBox.innerHTML = "";
        nextBtn.disabled = true;
      }
      progressText.textContent = tr().progress(currentIndex + 1, quiz.length);
      difficultyText.textContent = lastDifficulty === "mixed" ? `${tr().difficulties.mixed} · ${tr().difficulties[q.difficulty]}` : tr().difficulties[q.difficulty];
      progressBar.style.width = `${(currentIndex / quiz.length) * 100}%`;
      qExtra.textContent = tr()[q.promptKey];
      qMain.classList.remove("math-render", "long-text-question");
      qMain.innerHTML = "";
      if (isLongTextQuestion(q.main)) {
        qMain.classList.add("long-text-question");
        qMain.textContent = textOnlyLatexToPlain(q.main);
      } else {
        renderLatex(qMain, q.main, true);
      }
      if (resetOptions) {
        optionsEl.innerHTML = "";
        q.options.forEach(option => {
          const btn = document.createElement("button");
          btn.className = "option";
          btn.dataset.answerKey = answerKey(option);
          btn.setAttribute("aria-label", answerToString(option));
          renderLatex(btn, answerToString(option));
          btn.addEventListener("click", () => chooseOption(btn, option));
          optionsEl.appendChild(btn);
        });
      }
      nextBtn.textContent = currentIndex === quiz.length - 1 ? tr().resultBtn : tr().nextBtn;
      if (resetOptions) startTimerForQuestion();
      else updateTimerDisplay();
    }
    function renderFeedback(correct, answer, timeUp = false) {
      feedbackEl.className = "feedback";
      if (correct) {
        feedbackEl.textContent = tr().correctFeedback;
        feedbackEl.classList.add("good");
      } else {
        feedbackEl.innerHTML = `${timeUp ? tr().timeUpPrefix : tr().incorrectPrefix} ${mathSpan(answer, "feedback-math")}.`;
        renderTaggedMath(feedbackEl);
        feedbackEl.classList.add("bad");
      }
    }
    function renderSolutionBox() {
      const q = quiz[currentIndex];
      if (!q || !answered) {
        solutionBox.classList.add("hidden");
        solutionBox.innerHTML = "";
        return;
      }
      const correct = answerToString(q.answer);
      solutionBox.classList.remove("hidden");
      solutionBox.innerHTML = `<h4>${tr().solutionTitle}</h4><div class="solution-chain">${q.lines.map(step => `<div class="chain-line">${mathSpan(step.line, "chain-math")}<span class="chain-note">${escapeHtml(step.note || "")}</span></div>`).join("")}</div><div class="solution-answer">${tr().solutionFinal} ${mathSpan(correct, "answer-math")}</div>`;
      renderTaggedMath(solutionBox);
    }
    function chooseOption(button, selected) {
      if (answered) return;
      answered = true;
      clearTimer();
      const q = quiz[currentIndex];
      const correct = q.answer;
      const correctDisplay = answerToString(correct);
      const isCorrect = isSameAnswer(selected, correct);
      [...optionsEl.querySelectorAll(".option")].forEach(btn => {
        btn.disabled = true;
        if (btn.dataset.answerKey === answerKey(correct)) btn.classList.add("correct");
      });
      if (isCorrect) {
        correctCount += 1;
        renderFeedback(true, correctDisplay, false);
      } else {
        button.classList.add("wrong");
        renderFeedback(false, correctDisplay, false);
        wrongAnswers.push({ main: q.plain, answer: correctDisplay, selected: answerToString(selected), type: q.type, difficulty: q.difficulty });
      }
      void window.MCLProgress?.recordGameAttempt?.({
        question: q,
        course: "algebra-2",
        topic: q.type,
        correctAnswer: correctDisplay,
        selectedAnswer: answerToString(selected),
        isCorrect
      });
      renderSolutionBox();
      nextBtn.disabled = false;
      progressBar.style.width = `${((currentIndex + 1) / quiz.length) * 100}%`;
    }
    function handleTimeUp() {
      if (answered) return;
      clearTimer();
      answered = true;
      const q = quiz[currentIndex];
      const correct = q.answer;
      const correctDisplay = answerToString(correct);
      [...optionsEl.querySelectorAll(".option")].forEach(btn => {
        btn.disabled = true;
        if (btn.dataset.answerKey === answerKey(correct)) btn.classList.add("correct");
      });
      renderFeedback(false, correctDisplay, true);
      wrongAnswers.push({ main: q.plain, answer: correctDisplay, selected: null, timeUp: true, type: q.type, difficulty: q.difficulty });
      void window.MCLProgress?.recordGameAttempt?.({
        question: q,
        course: "algebra-2",
        topic: q.type,
        correctAnswer: correctDisplay,
        selectedAnswer: "",
        isCorrect: false,
        timeUp: true
      });
      renderSolutionBox();
      nextBtn.disabled = false;
      progressBar.style.width = `${((currentIndex + 1) / quiz.length) * 100}%`;
    }
    function nextQuestion() {
      if (!answered) return;
      if (currentIndex < quiz.length - 1) {
        currentIndex += 1;
        renderQuestion(true);
      } else {
        showResult();
      }
    }
    function showResult() {
      clearTimer();
      quizCard.classList.add("hidden");
      resultCard.classList.remove("hidden");
      renderResultBody();
    }
    function renderResultBody() {
      const total = quiz.length;
      const accuracy = total ? Math.round((correctCount / total) * 100) : 0;
      scoreNum.textContent = `${correctCount}/${total}`;
      accuracyNum.textContent = `${accuracy}%`;
      wrongNum.textContent = `${wrongAnswers.length}`;
      wrongList.innerHTML = "";
      if (!wrongAnswers.length) {
        const item = document.createElement("div");
        item.className = "wrong-item";
        item.innerHTML = `<div class="expr">${tr().noWrong}</div><p class="tag-good">${tr().noWrongTip}</p>`;
        wrongList.appendChild(item);
        return;
      }
      wrongAnswers.forEach((wrong, index) => {
        const item = document.createElement("div");
        item.className = "wrong-item";
        item.innerHTML = `<div class="expr">${index + 1}. ${mathSpan(wrong.main, "wrong-math")}</div><p>${tr().yourAnswer}: <span class="tag-bad">${escapeHtml(wrong.timeUp ? tr().timeUpAnswer : wrong.selected)}</span></p><p>${tr().correctAnswer}: ${mathSpan(wrong.answer, "wrong-math")}</p><p>${tr().suggestion}</p>`;
        wrongList.appendChild(item);
        renderTaggedMath(item);
      });
    }
    function resetToSetup() {
      clearTimer();
      setupCard.classList.remove("hidden");
      quizCard.classList.add("hidden");
      resultCard.classList.add("hidden");
      progressBar.style.width = "0%";
      sampleBox.classList.add("hidden");
      sampleBox.innerHTML = "";
      solutionBox.classList.add("hidden");
      solutionBox.innerHTML = "";
    }
    function quitQuiz() { if (answered || currentIndex > 0) showResult(); else resetToSetup(); }
    function showSample() {
      const q = generateQuestion(pickDifficultyForSample(difficultyEl.value));
      const correct = answerToString(q.answer);
      sampleBox.classList.remove("hidden");
      sampleBox.innerHTML = `<strong>${tr().sampleTitle}:</strong><br>${tr().sampleQuestion}: ${mathSpan(q.plain, "sample-math")}<br>${tr()[q.promptKey]}<br>${tr().sampleAnswer}: ${mathSpan(correct, "sample-math")}<br>${tr().sampleOptions}: ${q.options.map(item => mathSpan(answerToString(item), "sample-math")).join(" ")}`;
      renderTaggedMath(sampleBox);
    }

    timedModeEl.addEventListener("change", updateTimerControls);
    startBtn.addEventListener("click", buildQuiz);
    sampleBtn.addEventListener("click", showSample);
    nextBtn.addEventListener("click", nextQuestion);
    quitBtn.addEventListener("click", quitQuiz);
    restartBtn.addEventListener("click", resetToSetup);
    reviewWrongBtn.addEventListener("click", buildWrongTypeQuiz);
    window.addEventListener("storage", event => { if (event.key === "mathcomplete_lang") applyLanguage(); });
    applyLanguage();
  </script>
  <script src="../assets/js/tool-modes.js"></script>
  <script src="../assets/js/home-link.js"></script>
</body>
</html>
