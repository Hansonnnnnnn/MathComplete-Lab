<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logarithmic Functions Practice</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/auth-ui.js"></script>
  <script src="../assets/js/progress.js"></script>
  <style>
    :root {
      --bg: #f7f7fb;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e5e7eb;
      --accent: #2563eb;
      --violet: #7c3aed;
      --good: #16a34a;
      --bad: #dc2626;
      --shadow: 0 18px 42px rgba(15, 23, 42, 0.10);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.35), transparent 34%),
        radial-gradient(circle at top right, rgba(167, 139, 250, 0.28), transparent 32%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 52%, #ffffff 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.42;
      background-image:
        linear-gradient(rgba(15, 23, 42, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, 0.045) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(180deg, black, transparent 72%);
    }

    .mc-site-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 18px auto 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.74);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.84);
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.10);
      position: sticky;
      top: 12px;
      z-index: 20;
    }

    .mc-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #0f172a;
      font-weight: 950;
      text-decoration: none;
      letter-spacing: -0.035em;
      white-space: nowrap;
    }

    .mc-brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: white;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.28);
    }

    .mc-links {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .mc-link {
      color: #475569;
      text-decoration: none;
      font-weight: 850;
      padding: 8px 11px;
      border-radius: 999px;
      transition: background 0.2s, color 0.2s;
    }

    .mc-link:hover { color: #1d4ed8; background: #eff6ff; }
    .mc-link.primary { color: white; background: #0f172a; }
    .mc-link.primary:hover { color: white; background: #1e293b; }

    .container {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 38px 0 68px;
      position: relative;
    }

    header { margin-bottom: 24px; overflow: visible; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      color: #1d4ed8;
      background: rgba(239, 246, 255, 0.86);
      border: 1px solid rgba(191, 219, 254, 0.8);
      font-weight: 950;
      margin-bottom: 14px;
    }

    .eyebrow-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #10b981;
      box-shadow: 0 0 0 6px rgba(16, 185, 129, 0.12);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5.2vw, 56px);
      line-height: 1.16;
      letter-spacing: -0.055em;
      background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 48%, #7c3aed 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      padding-bottom: 0.18em;
      overflow: visible;
    }

    h2 { margin: 0 0 12px; font-size: clamp(24px, 4vw, 34px); letter-spacing: -0.045em; }
    h3 { margin: 0 0 8px; letter-spacing: -0.025em; }

    .subtitle {
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.75;
      max-width: 780px;
      font-size: 17px;
    }

    .card {
      background: rgba(255, 255, 255, 0.90);
      border: 1px solid rgba(255, 255, 255, 0.76);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      backdrop-filter: blur(16px);
    }

    .setup-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin: 22px 0;
    }

    label { display: block; font-weight: 900; margin-bottom: 8px; }

    select,
    input {
      width: 100%;
      min-height: 46px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 16px;
      background: white;
      outline: none;
    }

    select:focus,
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: white;
      cursor: pointer;
      margin-bottom: 6px;
    }

    .checkbox-label input {
      width: auto;
      min-height: 0;
      transform: scale(1.15);
      accent-color: var(--accent);
    }

    .mini-hint { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.45; }

    button {
      appearance: none;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--violet));
      color: white;
      font-weight: 950;
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.14s, filter 0.2s, box-shadow 0.2s;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24);
    }

    button:hover { transform: translateY(-1px); filter: brightness(0.98); }
    button.secondary { background: #111827; box-shadow: 0 8px 18px rgba(17, 24, 39, 0.16); }
    button.ghost { background: white; color: var(--text); border: 1px solid var(--border); box-shadow: none; }
    button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }

    .hidden { display: none !important; }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

    .explain-box {
      margin-top: 18px;
      padding: 16px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      color: var(--muted);
      line-height: 1.7;
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: white;
      color: var(--muted);
      font-weight: 850;
      font-size: 14px;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    .timer-pill { color: #1d4ed8; background: #eff6ff; border-color: #bfdbfe; }
    .timer-danger { color: #991b1b; background: #fef2f2; border-color: #fecaca; }

    .progress-wrap {
      width: 100%;
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin: 10px 0 22px;
    }

    .progress {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      transition: width 0.25s ease;
    }

    .question-title { color: var(--muted); font-weight: 950; margin-bottom: 8px; }
    .question-extra { color: var(--muted); font-weight: 900; margin: -4px 0 14px; line-height: 1.6; }

    .question-main {
      font-size: clamp(28px, 5.4vw, 54px);
      line-height: 1.2;
      font-weight: 950;
      letter-spacing: -0.045em;
      margin: 10px 0 24px;
      overflow-wrap: anywhere;
    }

    .math-render { display: inline-block; }
    .question-main.math-render { display: block; width: 100%; }
    .question-main .katex { font-size: 1.08em; line-height: 1.2; }
    .option .katex { font-size: 1.1em; line-height: 1.25; }
    .chain-math .katex, .answer-math .katex, .feedback-math .katex, .sample-math .katex, .wrong-math .katex { font-size: 1.06em; line-height: 1.25; }
    .math-render .katex { color: #0f172a; }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .option {
      border: 2px solid var(--border);
      background: white;
      color: var(--text);
      box-shadow: none;
      border-radius: 18px;
      min-height: 64px;
      font-size: 20px;
      text-align: center;
      padding: 12px;
      overflow-wrap: anywhere;
    }

    .option:hover { border-color: var(--accent); background: #f8fbff; }
    .option.correct { border-color: rgba(22, 163, 74, 0.5); background: #ecfdf5; color: #065f46; }
    .option.wrong { border-color: rgba(220, 38, 38, 0.5); background: #fef2f2; color: #991b1b; }
    .option.correct .katex { color: #065f46; }
    .option.wrong .katex { color: #991b1b; }

    .feedback { min-height: 30px; font-weight: 950; margin: 8px 0 16px; }
    .feedback.good { color: var(--good); }
    .feedback.bad { color: var(--bad); }
    .feedback.bad .katex { color: #dc2626; }

    .solution-box {
      margin: 14px 0 18px;
      padding: 18px;
      border-radius: 20px;
      border: 1px solid #dbeafe;
      background: linear-gradient(180deg, #f8fbff, #fff);
      color: #1f2937;
      line-height: 1.7;
    }

    .solution-box h4 { margin: 0 0 12px; font-size: 18px; }
    .solution-chain { background: white; border: 1px solid #e5e7eb; border-radius: 16px; padding: 14px 16px; overflow-x: auto; }

    .chain-line {
      display: grid;
      grid-template-columns: minmax(250px, 1fr) minmax(170px, 0.65fr);
      align-items: baseline;
      gap: 18px;
      margin: 8px 0;
      font-size: 17px;
      font-weight: 850;
      white-space: nowrap;
    }

    .chain-note { color: #64748b; font-size: 13px; font-weight: 850; white-space: normal; }
    .solution-answer { margin-top: 12px; font-weight: 950; color: #111827; }
    .solution-answer > .answer-math { display: inline-block; background: #ecfdf5; color: #065f46; border: 1px solid #bbf7d0; border-radius: 999px; padding: 3px 10px; margin-left: 4px; vertical-align: middle; }

    .result-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; margin: 18px 0 24px; }
    .stat { background: #f9fafb; border: 1px solid var(--border); border-radius: 18px; padding: 18px; }
    .stat .num { font-size: 34px; font-weight: 950; letter-spacing: -0.05em; }
    .stat .label { color: var(--muted); margin-top: 4px; font-weight: 850; }
    .wrong-list { display: grid; gap: 14px; }
    .wrong-item { border: 1px solid var(--border); border-radius: 18px; background: white; padding: 16px; }
    .wrong-item .expr { font-size: 22px; font-weight: 950; margin-bottom: 8px; overflow-wrap: anywhere; }
    .wrong-item p { margin: 6px 0; color: var(--muted); line-height: 1.6; }
    .tag-good { color: var(--good); font-weight: 950; }
    .tag-bad { color: var(--bad); font-weight: 950; }

    @media (max-width: 760px) {
      .mc-site-shell { border-radius: 22px; align-items: flex-start; flex-direction: column; }
      .mc-links { justify-content: flex-start; }
      .setup-grid, .options, .result-grid { grid-template-columns: 1fr; }
      .card { padding: 18px; }
      .container { width: min(100% - 22px, 1040px); padding-top: 26px; }
      .chain-line { grid-template-columns: 1fr; gap: 2px; white-space: normal; }
      .chain-note { padding-left: 12px; }
    }
  

  /* MathComplete Lab shared tool question layout override */
  .question-main,
  .expression,
  .equation {
    max-width: 100%;
    font-size: clamp(28px, 5.4vw, 54px) !important;
    line-height: 1.2 !important;
    font-weight: 500 !important;
    letter-spacing: -0.045em !important;
    margin: 10px 0 24px !important;
    text-align: left !important;
    overflow-wrap: anywhere !important;
    word-break: normal !important;
    text-wrap: pretty;
    white-space: normal;
    justify-content: flex-start !important;
    align-items: flex-start !important;
  }

  .question-main.math-render,
  .expression.math-render,
  .equation.math-render {
    display: block !important;
    width: 100% !important;
    text-align: left !important;
  }

  .question-main .katex,
  .expression .katex,
  .equation .katex {
    white-space: normal !important;
    text-align: left !important;
    font-weight: 400 !important;
  }

  .question-main .katex *,
  .expression .katex *,
  .equation .katex * {
    font-weight: 400 !important;
  }

  .question-line,
  .question-text {
    max-width: 100%;
    text-align: left !important;
    overflow-wrap: anywhere;
    word-break: normal;
    text-wrap: pretty;
  }
</style>
</head>
<body>
  <nav class="mc-site-shell">
    <a class="mc-brand" href="../index.html"><span class="mc-brand-mark">∑</span><span>MathComplete Lab</span></a>
    <div class="mc-links">
      <a class="mc-link" href="../practice.html" data-i18n="navPractice">Practice Library</a>
      <a class="mc-link primary" href="../index.html" data-i18n="navHome">Home</a>
    </div>
  </nav>

  <main class="container">
    <header>
      <div class="eyebrow"><span class="eyebrow-dot"></span><span id="toolBadge"></span></div>
      <h1 id="pageTitle"></h1>
      <p id="pageSubtitle" class="subtitle"></p>
    </header>

    <section id="setupCard" class="card">
      <h2 id="setupTitle"></h2>
      <div class="setup-grid">
        <div><label id="difficultyLabel" for="difficulty"></label><select id="difficulty"></select></div>
        <div class="mcl-tool-mode-field">
          <label id="toolModeLabel" for="toolMode">Practice mode</label>
          <select id="toolMode">
            <option value="practice">Practice Mode</option>
            <option value="learn" selected>Learn Mode</option>
            <option value="exam">Exam Mode</option>
          </select>
          <p class="mcl-tool-mode-hint" id="mclToolModeHint">Every answer shows the solution, then you move on manually.</p>
        </div>
        <div><label id="questionCountLabel" for="questionCount"></label><input id="questionCount" type="number" min="1" max="100" value="10" /></div>
        <div><label id="optionCountLabel" for="optionCount"></label><select id="optionCount"></select></div>
        <div><label class="checkbox-label" for="timedMode"><input id="timedMode" type="checkbox" /><span id="timedModeText"></span></label><p id="timedModeHint" class="mini-hint"></p></div>
        <div><label id="timerLevelLabel" for="timerLevel"></label><select id="timerLevel"></select></div>
      </div>
      <div class="actions"><button id="startBtn"></button><button id="sampleBtn" class="ghost"></button></div>
      <div id="sampleBox" class="explain-box hidden"></div>
      <div id="noteBox" class="explain-box"></div>
    </section>

    <section id="quizCard" class="card hidden">
      <div class="topbar">
        <div><span class="pill" id="progressText"></span><span class="pill" id="difficultyText"></span><span class="pill timer-pill hidden" id="timerDisplay"></span></div>
        <button id="quitBtn" class="ghost"></button>
      </div>
      <div class="progress-wrap"><div id="progressBar" class="progress"></div></div>
      <div id="questionTitle" class="question-title"></div>
      <div id="questionExtra" class="question-extra"></div>
      <div id="questionMain" class="question-main"></div>
      <div id="options" class="options"></div>
      <div id="feedback" class="feedback"></div>
      <div id="solutionBox" class="solution-box hidden"></div>
      <div class="actions"><button id="nextBtn" disabled></button></div>
    </section>

    <section id="resultCard" class="card hidden">
      <h2 id="resultTitle"></h2>
      <div class="result-grid">
        <div class="stat"><div id="scoreNum" class="num">0/0</div><div id="scoreLabel" class="label"></div></div>
        <div class="stat"><div id="accuracyNum" class="num">0%</div><div id="accuracyLabel" class="label"></div></div>
        <div class="stat"><div id="wrongNum" class="num">0</div><div id="wrongLabel" class="label"></div></div>
      </div>
      <h3 id="wrongReviewTitle"></h3>
      <div id="wrongList" class="wrong-list"></div>
      <div class="actions" style="margin-top:22px;"><button id="restartBtn"></button><button id="reviewWrongBtn" class="secondary"></button></div>
    </section>
  </main>

    function applyLanguage() {
      const lang = getLang();
      document.documentElement.lang = tr().htmlLang;
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.dataset.i18n;
        if (tr()[key]) el.textContent = tr()[key];
      });
      document.getElementById("toolBadge").textContent = gt().toolBadge;
      document.getElementById("pageTitle").textContent = gt().title;
      document.getElementById("pageSubtitle").textContent = gt().subtitle;
      document.getElementById("setupTitle").textContent = tr().setupTitle;
      document.getElementById("difficultyLabel").textContent = tr().difficultyLabel;
      document.getElementById("questionCountLabel").textContent = tr().questionCountLabel;
      document.getElementById("optionCountLabel").textContent = tr().optionCountLabel;
      document.getElementById("timedModeText").textContent = tr().timedModeText;
      document.getElementById("timedModeHint").textContent = tr().timedModeHint;
      document.getElementById("timerLevelLabel").textContent = tr().timerLevelLabel;
      startBtn.textContent = tr().startBtn;
      sampleBtn.textContent = tr().sampleBtn;
      quitBtn.textContent = tr().quitBtn;
      nextBtn.textContent = tr().nextBtn;
      resultTitle.textContent = tr().resultTitle;
      document.getElementById("scoreLabel").textContent = tr().scoreLabel;
      document.getElementById("accuracyLabel").textContent = tr().accuracyLabel;
      document.getElementById("wrongLabel").textContent = tr().wrongLabel;
      document.getElementById("wrongReviewTitle").textContent = tr().wrongReviewTitle;
      restartBtn.textContent = tr().restartBtn;
      reviewWrongBtn.textContent = tr().reviewWrongBtn;
      noteBox.textContent = gt().note;
      difficultyEl.innerHTML = ["easy", "medium", "hard", "expert", "mixed"].map(k => `<option value="${k}">${gt().difficultyOptions[k]}</option>`).join("");
      optionCountEl.innerHTML = [2,3,4,5,6].map(n => `<option value="${n}" ${n===4?"selected":""}>${tr().optionCount(n)}</option>`).join("");
      timerLevelEl.innerHTML = Object.keys(TIMER_DURATIONS).map(k => `<option value="${k}">${tr().timerOptions[k]}</option>`).join("");
      updateTimerControls();
    }
    function buildQuiz() {
      const count = Math.max(1, Math.min(100, Number(questionCountEl.value || 10)));
      const difficulty = difficultyEl.value;
      quiz = Array.from({ length: count }, () => generateQuestion(difficulty));
      wrongAnswers = [];
      currentIndex = 0;
      correctCount = 0;
      setupCard.classList.add("hidden");
      resultCard.classList.add("hidden");
      quizCard.classList.remove("hidden");
      renderQuestion(false);
    }
    function buildWrongTypeQuiz() {
      if (!lastWrongTypes.length) return;
      const count = Math.max(1, Math.min(30, Number(questionCountEl.value || 10)));
      quiz = Array.from({ length: count }, (_, i) => generateQuestion("mixed", lastWrongTypes[i % lastWrongTypes.length]));
      wrongAnswers = [];
      currentIndex = 0;
      correctCount = 0;
      resultCard.classList.add("hidden");
      quizCard.classList.remove("hidden");
      renderQuestion(false);
    }
    function startTimer() {
      clearTimer();
      if (!timedModeEl.checked) return;
      secondsLeft = TIMER_DURATIONS[timerLevelEl.value] || 60;
      timerDisplay.classList.remove("hidden");
      timerDisplay.textContent = tr().timerDisplay(secondsLeft);
      timerId = setInterval(() => {
        secondsLeft -= 1;
        timerDisplay.textContent = tr().timerDisplay(secondsLeft);
        timerDisplay.classList.toggle("timer-danger", secondsLeft <= 10);
        if (secondsLeft <= 0) handleTimeUp();
      }, 1000);
    }
    function renderQuestion(resetTimer = true) {
      answered = false;
      nextBtn.disabled = true;
      feedback.textContent = "";
      feedback.className = "feedback";
      solutionBox.classList.add("hidden");
      solutionBox.innerHTML = "";
      const q = quiz[currentIndex];
      progressText.textContent = tr().progress(currentIndex + 1, quiz.length);
      difficultyText.textContent = `${tr().difficulties[q.difficulty] || q.difficulty}`;
      questionTitle.textContent = gt().questionTitle;
      questionExtra.textContent = tr()[q.promptKey] || gt()[q.promptKey] || "";
      renderMainLatex(q.main);
      optionsEl.innerHTML = "";
      q.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.dataset.answerKey = answerKey(opt);
        btn.innerHTML = mathSpan(answerToString(opt));
        btn.addEventListener("click", () => chooseAnswer(btn, opt));
        optionsEl.appendChild(btn);
      });
      renderTaggedMath(optionsEl);
      progressBar.style.width = `${(currentIndex / quiz.length) * 100}%`;
      if (resetTimer) startTimer(); else startTimer();
    }
    function renderFeedback(isCorrect, correctDisplay, timeUp = false) {
      feedback.className = `feedback ${isCorrect ? "good" : "bad"}`;
      if (isCorrect) feedback.textContent = tr().correctFeedback;
      else feedback.innerHTML = `${timeUp ? tr().timeUpPrefix : tr().incorrectPrefix} ${mathSpan(correctDisplay, "feedback-math")}`;
      renderTaggedMath(feedback);
    }
    function renderSolutionBox() {
      const q = quiz[currentIndex];
      const lines = q.solution.map(step => {
        const note = gt().notes[step.noteKey] || step.noteKey || "";
        return `<div class="chain-line"><span class="chain-math">${mathSpan(step.math, "chain-math")}</span><span class="chain-note">${escapeHtml(note)}</span></div>`;
      }).join("");
      solutionBox.classList.remove("hidden");
      solutionBox.innerHTML = `<h4>${tr().solutionTitle}</h4><div class="solution-chain">${lines}</div><div class="solution-answer">${tr().solutionFinal} <span class="answer-math">${mathSpan(q.answer, "answer-math")}</span></div>`;
      renderTaggedMath(solutionBox);
    }
    function chooseAnswer(btn, selected) {
      if (answered) return;
      answered = true;
      clearTimer();
      const q = quiz[currentIndex];
      const correctKey = answerKey(q.answer);
      const selectedKey = answerKey(selected);
      const isCorrect = selectedKey === correctKey;
      if (isCorrect) correctCount += 1;
      optionsEl.querySelectorAll("button").forEach(option => {
        option.disabled = true;
        if (option.dataset.answerKey === correctKey) option.classList.add("correct");
      });
      if (!isCorrect) {
        btn.classList.add("wrong");
        wrongAnswers.push({ main: q.plain, answer: q.answer, selected, type: q.type, difficulty: q.difficulty, timeUp: false });
      }
      renderFeedback(isCorrect, q.answer);
      void window.MCLProgress?.recordGameAttempt?.({ question: q, course: "algebra-2", topic: q.type, correctAnswer: answerToString(q.answer), selectedAnswer: answerToString(selected), isCorrect });
      renderSolutionBox();
      nextBtn.disabled = false;
      progressBar.style.width = `${((currentIndex + 1) / quiz.length) * 100}%`;
    }
    function handleTimeUp() {
      if (answered) return;
      answered = true;
      clearTimer();
      const q = quiz[currentIndex];
      const correctKey = answerKey(q.answer);
      optionsEl.querySelectorAll("button").forEach(btn => {
        btn.disabled = true;
        if (btn.dataset.answerKey === correctKey) btn.classList.add("correct");
      });
      wrongAnswers.push({ main: q.plain, answer: q.answer, selected: null, type: q.type, difficulty: q.difficulty, timeUp: true });
      renderFeedback(false, q.answer, true);
      void window.MCLProgress?.recordGameAttempt?.({ question: q, course: "algebra-2", topic: q.type, correctAnswer: answerToString(q.answer), selectedAnswer: "", isCorrect: false, timeUp: true });
      renderSolutionBox();
      nextBtn.disabled = false;
      progressBar.style.width = `${((currentIndex + 1) / quiz.length) * 100}%`;
    }
    function nextQuestion() {
      if (!answered) return;
      if (currentIndex < quiz.length - 1) { currentIndex += 1; renderQuestion(true); }
      else showResult();
    }
    function showResult() {
      clearTimer();
      quizCard.classList.add("hidden");
      resultCard.classList.remove("hidden");
      renderResultBody();
    }
    function renderResultBody() {
      const total = quiz.length;
      const accuracy = total ? Math.round((correctCount / total) * 100) : 0;
      scoreNum.textContent = `${correctCount}/${total}`;
      accuracyNum.textContent = `${accuracy}%`;
      wrongNum.textContent = `${wrongAnswers.length}`;
      lastWrongTypes = [...new Set(wrongAnswers.map(x => x.type))];
      reviewWrongBtn.disabled = !lastWrongTypes.length;
      wrongList.innerHTML = "";
      if (!wrongAnswers.length) {
        const item = document.createElement("div");
        item.className = "wrong-item";
        item.innerHTML = `<div class="expr">${tr().noWrong}</div><p class="tag-good">${tr().noWrongTip}</p>`;
        wrongList.appendChild(item);
        return;
      }
      wrongAnswers.forEach((wrong, index) => {
        const item = document.createElement("div");
        item.className = "wrong-item";
        item.innerHTML = `<div class="expr">${index + 1}. ${mathSpan(wrong.main, "wrong-math")}</div><p>${tr().yourAnswer}: <span class="tag-bad">${wrong.timeUp ? escapeHtml(tr().timeUpAnswer) : mathSpan(wrong.selected, "wrong-math")}</span></p><p>${tr().correctAnswer}: ${mathSpan(wrong.answer, "wrong-math")}</p><p>${escapeHtml(gt().suggestion)}</p>`;
        wrongList.appendChild(item);
        renderTaggedMath(item);
      });
    }
    function resetToSetup() {
      clearTimer();
      setupCard.classList.remove("hidden");
      quizCard.classList.add("hidden");
      resultCard.classList.add("hidden");
      progressBar.style.width = "0%";
      sampleBox.classList.add("hidden");
      sampleBox.innerHTML = "";
      solutionBox.classList.add("hidden");
      solutionBox.innerHTML = "";
    }
    function quitQuiz() { if (answered || currentIndex > 0) showResult(); else resetToSetup(); }
    function showSample() {
      const q = generateQuestion(pickDifficultyForSample(difficultyEl.value));
      sampleBox.classList.remove("hidden");
      sampleBox.innerHTML = `<strong>${tr().sampleTitle}:</strong><br>${tr().sampleQuestion}: ${mathSpan(q.plain, "sample-math")}<br>${tr()[q.promptKey] || ""}<br>${tr().sampleAnswer}: ${mathSpan(q.answer, "sample-math")}<br>${tr().sampleOptions}: ${q.options.map(item => mathSpan(item, "sample-math")).join(" ")}`;
      renderTaggedMath(sampleBox);
    }

    timedModeEl.addEventListener("change", updateTimerControls);
    startBtn.addEventListener("click", buildQuiz);
    sampleBtn.addEventListener("click", showSample);
    nextBtn.addEventListener("click", nextQuestion);
    quitBtn.addEventListener("click", quitQuiz);
    restartBtn.addEventListener("click", resetToSetup);
    reviewWrongBtn.addEventListener("click", buildWrongTypeQuiz);
    window.addEventListener("storage", event => { if (event.key === "mathcomplete_lang") applyLanguage(); });
    applyLanguage();
  </script>
  <script src="../assets/js/tool-modes.js"></script>
  <script src="../assets/js/report-export.js"></script>
  <script src="../assets/js/home-link.js"></script>
</body>
</html>
