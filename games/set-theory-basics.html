  /* MathComplete Lab shared tool question layout override */
  .question-main,
  .expression,
  .equation {
    max-width: 100%;
    font-size: clamp(28px, 5.4vw, 54px) !important;
    line-height: 1.2 !important;
    font-weight: 500 !important;
    letter-spacing: -0.045em !important;
    margin: 10px 0 24px !important;
    text-align: left !important;
    overflow-wrap: anywhere !important;
    word-break: normal !important;
    text-wrap: pretty;
    white-space: normal;
    justify-content: flex-start !important;
    align-items: flex-start !important;
  }

  .question-main.math-render,
  .expression.math-render,
  .equation.math-render {
    display: block !important;
    width: 100% !important;
    text-align: left !important;
  }

  .question-main .katex,
  .expression .katex,
  .equation .katex {
    white-space: normal !important;
    text-align: left !important;
    font-weight: 400 !important;
  }

  .question-main .katex *,
  .expression .katex *,
  .equation .katex * {
    font-weight: 400 !important;
  }

  .question-line,
  .question-text {
    max-width: 100%;
    text-align: left !important;
    overflow-wrap: anywhere;
    word-break: normal;
    text-wrap: pretty;
  }


  /* MathComplete Lab compact typography override
     Matched to completing-the-square typography, with smaller set-theory prompt text. */
  .container {
    width: min(1040px, calc(100% - 32px)) !important;
    padding: 38px 0 68px !important;
  }

  header {
    margin-bottom: 24px !important;
    overflow: visible !important;
  }

  h1 {
    font-size: clamp(34px, 5.2vw, 56px) !important;
    line-height: 1.16 !important;
    letter-spacing: -0.055em !important;
    margin: 16px 0 16px !important;
    padding-bottom: 0.18em !important;
    overflow: visible !important;
  }

  h2 {
    margin: 0 0 12px !important;
    font-size: clamp(24px, 4vw, 34px) !important;
    letter-spacing: -0.045em !important;
  }

  h3 {
    margin: 0 0 8px !important;
    letter-spacing: -0.025em !important;
  }

  .subtitle {
    margin: 14px 0 0 !important;
    font-size: 17px !important;
    line-height: 1.75 !important;
  }

  .card {
    padding: 24px !important;
    backdrop-filter: blur(16px) !important;
  }

  .setup-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
    gap: 18px !important;
    margin: 22px 0 !important;
  }

  .question-title {
    font-size: 16px !important;
  }

  .question-extra {
    font-size: 17px !important;
    margin: -4px 0 14px !important;
    line-height: 1.6 !important;
  }

  .question-main,
  .expression,
  .equation {
    font-size: clamp(22px, 3vw, 34px) !important;
    line-height: 1.45 !important;
    font-weight: 500 !important;
    letter-spacing: -0.02em !important;
    margin: 10px 0 22px !important;
    text-align: left !important;
    overflow-wrap: anywhere !important;
    word-break: normal !important;
    text-wrap: pretty;
    white-space: normal;
  }

  .question-text {
    font-size: 20px !important;
    font-weight: 650 !important;
    line-height: 1.55 !important;
    letter-spacing: -0.025em !important;
  }

  .question-line .katex,
  .question-main .katex {
    font-size: 1em !important;
    line-height: 1.25 !important;
  }

  .option {
    min-height: 64px !important;
    font-size: 20px !important;
    text-align: center !important;
    padding: 12px !important;
  }

  .option .katex {
    font-size: 1.1em !important;
    line-height: 1.25 !important;
  }

  .pill {
    font-size: 14px !important;
    font-weight: 850 !important;
  }

  .solution-box h3 {
    font-size: 18px !important;
  }

  .solution-steps {
    font-size: 17px !important;
  }

  @media (max-width: 760px) {
    .setup-grid, .options, .solution-grid, .result-grid { grid-template-columns: 1fr !important; }
    .container { width: min(100% - 22px, 1040px) !important; padding-top: 26px !important; }
    .card { padding: 18px !important; }
    .question-main, .expression, .equation { font-size: 24px !important; }
    .question-text { font-size: 19px !important; }
  }



  /* Compact, rendered wrong-answer review rows */
  .wrong-item {
    padding: 14px 18px !important;
    border-radius: 16px !important;
    border: 1px solid #fee2e2 !important;
    background: #fff7f7 !important;
    color: #7f1d1d !important;
    font-size: 16px !important;
    line-height: 1.65 !important;
    font-weight: 800 !important;
  }

  .wrong-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
    margin: 2px 0;
  }

  .wrong-label {
    color: #991b1b;
    font-weight: 950;
  }

  .wrong-value {
    display: inline-flex;
    align-items: baseline;
    color: #7f1d1d;
    font-weight: 850;
  }

  .wrong-value .katex {
    color: #7f1d1d;
    font-size: 1.04em;
    line-height: 1.25;
  }

  .feedback-answer {
    display: inline-flex;
    align-items: baseline;
  }

  .feedback-answer .katex {
    color: #dc2626;
    font-size: 1.04em;
  }

<body>
  <nav class="mc-site-shell">
    <a class="mc-brand" href="../index.html"><span class="mc-brand-mark">∑</span><span>MathComplete Lab</span></a>
    <div class="mc-links">
      <a href="../practice.html" id="navPractice"></a>
      <a class="active" href="../index.html" id="navHome"></a>
    </div>
  </nav>

  <main class="container">
    <header>
      <div class="eyebrow"><span class="eyebrow-dot"></span><span id="toolBadge"></span></div>
      <h1 id="pageTitle"></h1>
      <p id="pageSubtitle" class="subtitle"></p>
    </header>

    <section id="setupCard" class="card">
      <h2 id="setupTitle"></h2>
      <div class="setup-grid">
        <div><label id="difficultyLabel" for="difficulty"></label><select id="difficulty"></select></div>
        <div class="mcl-tool-mode-field">
          <label id="toolModeLabel" for="toolMode">Practice mode</label>
          <select id="toolMode">
            <option value="practice">Practice Mode</option>
            <option value="learn" selected>Learn Mode</option>
            <option value="exam">Exam Mode</option>
          </select>
          <p class="mcl-tool-mode-hint" id="mclToolModeHint">Every answer shows the solution, then you move on manually.</p>
        </div>
        <div><label id="questionCountLabel" for="questionCount"></label><input id="questionCount" type="number" min="1" max="100" value="10" /></div>
        <div><label id="optionCountLabel" for="optionCount"></label><select id="optionCount"></select></div>
        <div><label class="checkbox-label" for="timedMode"><input id="timedMode" type="checkbox" /><span id="timedModeText"></span></label><p id="timedModeHint" class="mini-hint"></p></div>
        <div><label id="timerLevelLabel" for="timerLevel"></label><select id="timerLevel"></select></div>
      </div>
      <div class="actions"><button id="startBtn"></button><button id="sampleBtn" class="ghost"></button></div>
      <div id="sampleBox" class="explain-box hidden"></div>
      <div id="noteBox" class="explain-box"></div>
    </section>

    <section id="quizCard" class="card hidden">
      <div class="topbar"><div><span class="pill" id="progressText"></span><span class="pill" id="difficultyText"></span><span class="pill timer-pill hidden" id="timerDisplay"></span></div><button id="quitBtn" class="ghost"></button></div>
      <div class="progress-wrap"><div id="progressBar" class="progress"></div></div>
      <div id="questionTitle" class="question-title"></div>
      <div id="questionExtra" class="question-extra"></div>
      <div id="questionMain" class="question-main"></div>
      <div id="options" class="options"></div>
      <div id="feedback" class="feedback"></div>
      <div id="solutionBox" class="solution-box hidden"></div>
      <div class="actions"><button id="nextBtn" disabled></button></div>
    </section>

    <section id="resultCard" class="card hidden">
      <h2 id="resultTitle"></h2>
      <div class="result-grid"><div class="stat"><div id="scoreNum" class="num">0/0</div><div id="scoreLabel" class="label"></div></div><div class="stat"><div id="accuracyNum" class="num">0%</div><div id="accuracyLabel" class="label"></div></div><div class="stat"><div id="wrongNum" class="num">0</div><div id="wrongLabel" class="label"></div></div></div>
      <h3 id="wrongReviewTitle"></h3><div id="wrongList" class="wrong-list"></div>
      <div class="actions" style="margin-top:22px"><button id="restartBtn"></button><button id="reviewWrongBtn" class="secondary"></button></div>
    </section>
  </main>

function setLanguage(newLang){lang=newLang;document.documentElement.lang=tr().htmlLang; el.navPractice.textContent=tr().navPractice;el.navHome.textContent=tr().navHome;el.toolBadge.textContent=tr().toolBadge;el.pageTitle.textContent=tr().title;el.pageSubtitle.textContent=tr().subtitle;el.setupTitle.textContent=tr().setupTitle;el.difficultyLabel.textContent=tr().difficultyLabel;el.questionCountLabel.textContent=tr().questionCountLabel;el.optionCountLabel.textContent=tr().optionCountLabel;el.timedModeText.textContent=tr().timedModeText;el.timedModeHint.textContent=tr().timedModeHint;el.timerLevelLabel.textContent=tr().timerLevelLabel;el.startBtn.textContent=tr().startBtn;el.sampleBtn.textContent=tr().sampleBtn;el.quitBtn.textContent=tr().quitBtn;nextBtn.textContent=tr().nextBtn;el.resultTitle.textContent=tr().resultTitle;el.scoreLabel.textContent=tr().scoreLabel;el.accuracyLabel.textContent=tr().accuracyLabel;el.wrongLabel.textContent=tr().wrongLabel;el.wrongReviewTitle.textContent=tr().wrongReviewTitle;el.restartBtn.textContent=tr().restartBtn;el.reviewWrongBtn.textContent=tr().reviewWrongBtn; noteBox.textContent=tr().note; buildSelects(); if(quiz.length) renderQuestion();}
function buildSelects(){const dVal=difficultySel.value||"easy", oVal=optionCount.value||"4", tVal=timerLevel.value||"timer_medium"; difficultySel.innerHTML=""; for(const k of ["easy","medium","hard","expert","mixed"]){const o=document.createElement("option");o.value=k;o.textContent=tr().difficultyOptions[k];difficultySel.appendChild(o)} difficultySel.value=dVal; optionCount.innerHTML=""; for(let n=2;n<=6;n++){const o=document.createElement("option");o.value=n;o.textContent=tr().optionCount(n);optionCount.appendChild(o)} optionCount.value=oVal; timerLevel.innerHTML=""; for(const k of ["timer_easy","timer_medium","timer_hard","timer_expert"]){const o=document.createElement("option");o.value=k;o.textContent=tr().timerOptions[k];timerLevel.appendChild(o)} timerLevel.value=tVal;}
function pickBuilder(diff, forcedTypes=null){let pool=builders.filter(b=>diff==="mixed"||b.difficulty===diff); if(forcedTypes&&forcedTypes.length){const narrow=pool.filter(b=>forcedTypes.includes(b.type)); if(narrow.length) pool=narrow;} return choice(pool)}
let quiz=[],currentIndex=0,answers=[],wrongQuestions=[],currentOptions=[],timer=null,timeLeft=0,currentForcedTypes=null;
function secondsForTimer(){return {timer_easy:120,timer_medium:60,timer_hard:30,timer_expert:15}[timerLevel.value]||60}
function startQuiz(forcedTypes=null){const count=Math.max(1,Math.min(100,parseInt(questionCount.value||"10",10))); const diff=difficultySel.value; currentForcedTypes=forcedTypes; quiz=Array.from({length:count},()=>safeBuildQuestion(pickBuilder(diff,forcedTypes))); currentIndex=0; answers=[]; wrongQuestions=[]; setupCard.classList.add("hidden"); resultCard.classList.add("hidden"); quizCard.classList.remove("hidden"); renderQuestion();}
function renderQuestion(){clearTimer(); const q=quiz[currentIndex]; currentOptions=makeOptions(q,parseInt(optionCount.value,10)); progressText.textContent=tr().progress(currentIndex+1,quiz.length); difficultyText.textContent=tr().difficulties[q.difficulty]; progressBar.style.width=`${(currentIndex/quiz.length)*100}%`; questionTitle.textContent=tr().questionTitle; questionExtra.textContent=tr()[q.promptKey]||""; questionMain.innerHTML=""; for(const line of q.main){const div=document.createElement("div");div.className=line.latex?"question-line":"question-text"; if(line.latex) div.appendChild(renderLatex(line.latex,false)); else div.textContent=line.text(); questionMain.appendChild(div)} optionsEl.innerHTML=""; feedback.textContent=""; feedback.className="feedback"; solutionBox.classList.add("hidden"); nextBtn.disabled=true; nextBtn.textContent=currentIndex===quiz.length-1?tr().resultBtn:tr().nextBtn; for(const op of currentOptions){const btn=document.createElement("button"); btn.className="option"; btn.type="button"; btn.appendChild(optionNode(op)); btn.onclick=()=>selectOption(op,btn); optionsEl.appendChild(btn)} if(timedMode.checked){timeLeft=secondsForTimer(); timerDisplay.textContent=tr().timerDisplay(timeLeft); timerDisplay.classList.remove("hidden"); timer=setInterval(()=>{timeLeft--;timerDisplay.textContent=tr().timerDisplay(timeLeft); if(timeLeft<=0) timeUp();},1000)} else timerDisplay.classList.add("hidden");}
function selectOption(op,btn){clearTimer(); const q=quiz[currentIndex]; const correct=op.key===q.answer.key; [...optionsEl.children].forEach(b=>{b.disabled=true}); btn.classList.add(correct?"correct":"wrong"); [...optionsEl.children].forEach((b,i)=>{if(currentOptions[i].key===q.answer.key)b.classList.add("correct")}); if(correct){
    feedback.textContent=tr().correctFeedback;
  }else{
    renderBadFeedback(tr().incorrectPrefix,q.answer);
  }
  feedback.className="feedback "+(correct?"good":"bad"); answers.push({q,selected:op,correct}); if(!correct) wrongQuestions.push(q); recordAttempt(q,optionText(q.answer),optionText(op),correct,false,op); renderSolutionBox(q); nextBtn.disabled=false; progressBar.style.width=`${((currentIndex+1)/quiz.length)*100}%`;}
function timeUp(){clearTimer(); const q=quiz[currentIndex]; [...optionsEl.children].forEach((b,i)=>{b.disabled=true;if(currentOptions[i].key===q.answer.key)b.classList.add("correct")}); renderBadFeedback(tr().timeUpPrefix,q.answer); feedback.className="feedback bad"; answers.push({q,selected:null,correct:false,timeUp:true}); wrongQuestions.push(q); recordAttempt(q,optionText(q.answer),"",false,true,null); renderSolutionBox(q); nextBtn.disabled=false; progressBar.style.width=`${((currentIndex+1)/quiz.length)*100}%`;}
function renderSolutionBox(q){solutionBox.innerHTML=""; const h=document.createElement("h3");h.textContent=tr().solutionTitle;solutionBox.appendChild(h); const grid=document.createElement("div");grid.className="solution-grid"; const steps=document.createElement("div");steps.className="solution-steps"; for(const s of q.solution){const div=document.createElement("div"); if(s.latex) div.appendChild(renderLatex(s.latex,false)); else div.textContent=s.text(); steps.appendChild(div)} const note=document.createElement("div");note.className="solution-note";note.textContent=tr().notes[q.noteKey]||""; grid.appendChild(steps);grid.appendChild(note);solutionBox.appendChild(grid); const ans=document.createElement("p");ans.innerHTML=`<strong>${tr().solutionFinal}</strong> `; const pill=document.createElement("span");pill.className="answer-pill";pill.appendChild(optionNode(q.answer)); ans.appendChild(pill); solutionBox.appendChild(ans); solutionBox.classList.remove("hidden");}
function nextQuestion(){if(currentIndex<quiz.length-1){currentIndex++;renderQuestion()}else showResults()}
function showResults(){
  clearTimer();
  quizCard.classList.add("hidden");
  resultCard.classList.remove("hidden");
  const correct=answers.filter(a=>a.correct).length;
  scoreNum.textContent=`${correct}/${answers.length}`;
  accuracyNum.textContent=`${answers.length?Math.round(correct/answers.length*100):0}%`;
  wrongNum.textContent=String(answers.length-correct);
  wrongList.innerHTML="";
  if(!wrongQuestions.length){
    const p=document.createElement("p");
    p.className="explain-box";
    p.textContent=`${tr().noWrong} ${tr().noWrongTip}`;
    wrongList.appendChild(p);
  } else {
    answers.filter(a=>!a.correct).forEach(a=>{
      const div=document.createElement("div");
      div.className="wrong-item";
      appendWrongReviewRow(div,tr().correctAnswer,a.q.answer,false);
      appendWrongReviewRow(div,tr().yourAnswer,a.selected,Boolean(a.timeUp));
      wrongList.appendChild(div);
    });
  }
}
function resetToSetup(){clearTimer();quizCard.classList.add("hidden");resultCard.classList.add("hidden");setupCard.classList.remove("hidden");progressBar.style.width="0%"}
function clearTimer(){if(timer){clearInterval(timer);timer=null}}
function optionLabel(index){return String.fromCharCode(65+index)}
function optionPayload(selected=null){
  return (currentOptions||[]).map((op,index)=>({
    label: optionLabel(index),
    latex: optionText(op),
    key: op.key,
    isCorrect: op.key===quiz[currentIndex].answer.key,
    isSelected: selected ? op.key===selected.key : false
  }))
}
function optionLabelFor(target){
  if(!target) return "";
  const index=(currentOptions||[]).findIndex(op=>op.key===target.key);
  return index>=0?optionLabel(index):"";
}
function recordAttempt(q, correctDisplay, selectedDisplay, isCorrect, timeUp=false, selectedOption=null){
  void window.MCLProgress?.recordGameAttempt?.({
    gameId:TOOL_CONFIG.gameId,
    question:{plain:q.plain,type:q.type,difficulty:q.difficulty},
    course:TOOL_CONFIG.course,
    topic:q.type,
    correctAnswer:correctDisplay,
    selectedAnswer:selectedDisplay,
    options:optionPayload(selectedOption),
    correctOptionLabel:optionLabelFor(q.answer),
    selectedOptionLabel:optionLabelFor(selectedOption),
    isCorrect,
    timeUp
  })
}
function generateSample(){const q=safeBuildQuestion(pickBuilder(difficultySel.value)); const opts=makeOptions(q,Math.min(4,parseInt(optionCount.value,10))); sampleBox.innerHTML=""; const h=document.createElement("strong");h.textContent=tr().sampleTitle; sampleBox.appendChild(h); const qd=document.createElement("div");qd.style.marginTop="10px"; qd.textContent=tr().sampleQuestion+":"; sampleBox.appendChild(qd); for(const line of q.main){const div=document.createElement("div");div.style.margin="8px 0"; if(line.latex)div.appendChild(renderLatex(line.latex,false)); else div.textContent=line.text(); sampleBox.appendChild(div)} const od=document.createElement("div");od.style.marginTop="10px";od.textContent=tr().sampleOptions+":";sampleBox.appendChild(od); opts.forEach(o=>{const d=document.createElement("div");d.style.margin="4px 0";d.appendChild(optionNode(o));sampleBox.appendChild(d)}); const ad=document.createElement("div");ad.style.marginTop="10px";ad.innerHTML=`<strong>${tr().sampleAnswer}:</strong> `;ad.appendChild(optionNode(q.answer));sampleBox.appendChild(ad); sampleBox.classList.remove("hidden")}

setLanguage(lang);
