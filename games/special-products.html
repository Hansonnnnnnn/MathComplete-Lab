    function readGlobalLanguage(){return localStorage.getItem("mathcomplete_lang")==="zh"?"zh":"en"}let lang=readGlobalLanguage();function tr(){return T[lang]}function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}function choose(a){return a[randInt(0,a.length-1)]}function shuffle(a){const c=[...a];for(let i=c.length-1;i>0;i--){const j=randInt(0,i);[c[i],c[j]]=[c[j],c[i]]}return c}function clamp(n,a,b){return Math.max(a,Math.min(b,n))}function formatTime(s){s=Math.max(0,s);return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`}function escapeHtml(t){return String(t).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}function renderLatex(el,latex,displayMode=false){el.classList.add("math-render");const boldLatex=`\\boldsymbol{${latex}}`;if(window.katex){katex.render(boldLatex,el,{throwOnError:false,displayMode})}else{el.textContent=latex}}function mathSpan(latex,cls=""){return `<span${cls?` class="${cls}"`:""} data-latex="${escapeHtml(latex)}"></span>`}function renderTaggedMath(root){root.querySelectorAll("[data-latex]").forEach(el=>renderLatex(el,el.getAttribute("data-latex")||""))}function ans(latex){return{kind:"latex",latex:String(latex)}}function answerKey(a){return a.latex.replace(/\s+/g,"")}function answerToString(a){return a.latex}function isSameAnswer(a,b){return answerKey(a)===answerKey(b)}
